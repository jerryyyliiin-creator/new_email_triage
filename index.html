.hm-name-cell { display:flex; align-items:center; gap:7px; min-width:0; padding-right:2px; }
.hm-avatar { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; flex-shrink:0; }
.hm-name { font-size:11px; font-weight:600; color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.hm-cell-val { position:relative; z-index:1; }
.hm-cell-stuck-dot { position:absolute; top:5px; right:5px; width:6px; height:6px; border-radius:50%; background:#EA580C; z-index:2; }
.hm-legend { display:flex; gap:14px; margin-top:16px; padding-top:12px; border-top:1px solid var(--line-soft); flex-wrap:wrap; align-items:center; }
.hm-legend-item { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--fg-dim); font-weight:600; }
.hm-legend-swatch { width:22px; height:10px; border-radius:4px; }

/* AI analysis callout */
.brief-analysis { background:rgba(0,166,81,0.06); border:1px solid rgba(0,166,81,0.2); border-radius:12px; padding:12px 14px; margin-bottom:18px; font-size:12px; color:var(--fg-mute); line-height:1.65; }
.wc-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--fg-dim); margin-bottom:12px; }
.wc-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.wc-row:last-of-type { margin-bottom:0; }
.wc-label { font-size:12px; font-weight:600; color:var(--fg); width:72px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
.wc-bar-track { flex:1; height:12px; background:var(--s2); border-radius:6px; overflow:hidden; display:flex; }
.wc-bar-seg { height:100%; transition:width .5s ease; min-width:0; }
.wc-count { font-size:12px; font-weight:700; color:var(--fg); width:22px; text-align:right; flex-shrink:0; }
.wc-meta { display:flex; align-items:center; gap:6px; flex-shrink:0; min-width:130px; }
.wc-pct { font-size:10px; font-weight:700; color:var(--fg-dim); width:38px; text-align:right; }

.wc-legend { display:flex; gap:14px; margin-top:14px; padding-top:10px; border-top:1px solid var(--line-soft); }
.wc-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--fg-dim); }
.wc-dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

const DocuSignSettingsCard = () => {
  const [cfg,         setCfg]         = React.useState(null);
  const [authMode,    setAuthMode]    = React.useState("apikey");
  const [accountId,   setAccountId]   = React.useState("");
  const [baseUrl,     setBaseUrl]     = React.useState("https://na4.docusign.net/restapi");
  const [accessToken, setAccessToken] = React.useState("");
  const [intKey,      setIntKey]      = React.useState("");
  const [userId,      setUserId]      = React.useState("");
  const [privateKey,  setPrivateKey]  = React.useState("");
  const [saving,      setSaving]      = React.useState(false);
  const [testStatus,  setTestStatus]  = React.useState(null);

  React.useEffect(() => {
    if (!IS_APPS_SCRIPT) return;
    gsRun("getDocuSignSettings").then(s => {
      if (!s) return;
      setCfg(s);
      setAuthMode(s.authMode || "apikey");
      setAccountId(s.accountId || "");
      setBaseUrl(s.baseUrl || "https://na4.docusign.net/restapi");
      setAccessToken(s.accessToken || "");
      setIntKey(s.integrationKey || "");
      setUserId(s.userId || "");
    }).catch(() => {});
  }, []);

  const handleSave = () => {
    setSaving(true);
    const payload = { authMode, accountId, baseUrl, accessToken, integrationKey: intKey, userId };
    if (privateKey.trim()) payload.privateKey = privateKey.trim();
    gsRun("saveDocuSignSettings", payload)
      .then(() => setSaving(false))
      .catch(() => setSaving(false));
  };

  const handleTest = () => {
    setTestStatus("testing");
    gsRun("testDocuSignConnection")
      .then(r => setTestStatus("✓ " + r.name + (r.accountName ? " · " + r.accountName : "")))
      .catch(e => setTestStatus("✗ " + (e.message || "Connection failed")));
  };

  const [editing, setEditing] = React.useState({ accountId: false, intKey: false, userId: false });
  const toggleEdit = (field) => setEditing(prev => ({ ...prev, [field]: !prev[field] }));
  const maskValue = (val) => {
    if (!val || val.length <= 10) return val;
    return val.slice(0, 5) + " ••••••••••••• " + val.slice(-5);
  };

  const inputStyle = { width:"100%", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, padding:"7px 10px", fontSize:12, color:"var(--fg)", outline:"none", boxSizing:"border-box" };
  const labelStyle = { fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em", color:"var(--fg-dim)", display:"block", marginBottom:4 };
  const maskedInputStyle = { ...inputStyle, fontFamily:"var(--font-mono)", letterSpacing:"0.02em", color:"var(--fg-mute)", background:"var(--bg-elev)", cursor:"default" };

  return (
    <div>
      {/* Auth mode toggle */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[["apikey","API Key (Personal)"],["jwt","Enterprise SSO (JWT)"]].map(([mode,lbl]) => (
          <button key={mode} onClick={() => setAuthMode(mode)}
            style={{fontSize:11,fontWeight:600,padding:"5px 12px",borderRadius:8,cursor:"pointer",border:"1px solid var(--border)",
              background: authMode===mode ? "var(--accent)" : "var(--bg-elev)",
              color: authMode===mode ? "#fff" : "var(--fg-dim)"}}>
            {lbl}
          </button>
        ))}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
            <label style={{...labelStyle,marginBottom:0}}>Account ID</label>
            {accountId && <button onClick={() => toggleEdit("accountId")} style={{fontSize:10,fontWeight:600,color:"var(--accent)",background:"none",border:"none",cursor:"pointer",padding:0}}>{editing.accountId ? "Done" : "Edit"}</button>}
          </div>
          {editing.accountId || !accountId
            ? <input style={inputStyle} value={accountId} onChange={e => setAccountId(e.target.value)} placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autoFocus={editing.accountId} />
            : <div style={maskedInputStyle}>{maskValue(accountId)}</div>}
        </div>
        <div>
          <label style={labelStyle}>API Base URL</label>
          <input style={inputStyle} value={baseUrl} onChange={e => setBaseUrl(e.target.value)} placeholder="https://na4.docusign.net/restapi" />
          <div style={{fontSize:10,color:"var(--fg-dim)",marginTop:3}}>Find your base URL in DocuSign → Admin → API &amp; Keys</div>
        </div>

        {authMode === "apikey" ? (
          <div>
            <label style={labelStyle}>Access Token</label>
            <input type="password" style={inputStyle} value={accessToken} onChange={e => setAccessToken(e.target.value)} placeholder="Personal access token from DocuSign developer portal" />
          </div>
        ) : (
          <>
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                <label style={{...labelStyle,marginBottom:0}}>Integration Key</label>
                {intKey && <button onClick={() => toggleEdit("intKey")} style={{fontSize:10,fontWeight:600,color:"var(--accent)",background:"none",border:"none",cursor:"pointer",padding:0}}>{editing.intKey ? "Done" : "Edit"}</button>}
              </div>
              {editing.intKey || !intKey
                ? <input style={inputStyle} value={intKey} onChange={e => setIntKey(e.target.value)} placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autoFocus={editing.intKey} />
                : <div style={maskedInputStyle}>{maskValue(intKey)}</div>}
            </div>
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                <label style={{...labelStyle,marginBottom:0}}>API User ID</label>
                {userId && <button onClick={() => toggleEdit("userId")} style={{fontSize:10,fontWeight:600,color:"var(--accent)",background:"none",border:"none",cursor:"pointer",padding:0}}>{editing.userId ? "Done" : "Edit"}</button>}
              </div>
              {editing.userId || !userId
                ? <input style={inputStyle} value={userId} onChange={e => setUserId(e.target.value)} placeholder="DocuSign user GUID to impersonate" autoFocus={editing.userId} />
                : <div style={maskedInputStyle}>{maskValue(userId)}</div>}
            </div>
            <div>
              <label style={labelStyle}>RSA Private Key {cfg && cfg.hasPrivateKey ? <span style={{color:"#22c55e",fontWeight:400,textTransform:"none"}}>· saved</span> : null}</label>
              <textarea style={{...inputStyle,minHeight:80,resize:"vertical",fontFamily:"var(--font-mono)",fontSize:11}}
                value={privateKey} onChange={e => setPrivateKey(e.target.value)}
                placeholder={"-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----"} />
              <div style={{fontSize:10,color:"var(--fg-dim)",marginTop:3}}>Generated in DocuSign Admin → Apps &amp; Keys → Add App. Leave blank to keep existing key.</div>
            </div>
          </>
        )}

        <div style={{display:"flex",alignItems:"center",gap:8,paddingTop:2}}>
          <button onClick={handleSave} disabled={saving}
            style={{fontSize:12,fontWeight:700,padding:"7px 16px",borderRadius:8,border:"none",cursor:saving?"not-allowed":"pointer",
              background:"#6366F1",color:"#fff"}}>
            {saving ? "Saving…" : "Save"}
          </button>
          <button onClick={handleTest}
            style={{fontSize:12,fontWeight:600,padding:"7px 14px",borderRadius:8,border:"1px solid var(--border)",cursor:"pointer",background:"var(--bg-elev)",color:"var(--fg)"}}>
            Test Connection
          </button>
          {testStatus && testStatus !== "testing" && (
            <span style={{fontSize:11,color:testStatus.startsWith("✓")?"#22c55e":"#ef4444",fontWeight:600}}>{testStatus}</span>
          )}
          {testStatus === "testing" && <span style={{fontSize:11,color:"var(--fg-dim)"}}>Testing…</span>}
        </div>
      </div>
    </div>
  );
};

const SettingsPane = ({ settings, onSaveSettings, onSaveSlackToken, vips, onOpenVips, onOpenRules, onClearHistory, user }) => {
  const [anthropicDraft, setAnthropicDraft] = React.useState("");
  const [clickupDraft,   setClickupDraft]   = React.useState(settings.apiKey || "");
  const [slackDraft,     setSlackDraft]     = React.useState(settings.slackToken || "");
  const [overrideDraft,  setOverrideDraft]  = React.useState(settings.slackOverrideChannel || "");
  const [saving,         setSaving]         = React.useState(false);
  const [saved,          setSaved]          = React.useState(false);
  const [saveError,      setSaveError]      = React.useState("");
  const [connTest,       setConnTest]       = React.useState({ anthropic: null, clickup: null, slack: null });

  // Sync drafts when settings load from backend (preserves values across refreshes)
  React.useEffect(() => {
    if (settings.apiKey && !clickupDraft)   setClickupDraft(settings.apiKey);
    if (settings.slackToken && !slackDraft) setSlackDraft(settings.slackToken);
    if (settings.slackOverrideChannel && !overrideDraft) setOverrideDraft(settings.slackOverrideChannel);
  }, [settings.apiKey, settings.slackToken, settings.slackOverrideChannel]);
  const [alertsEnabled,  setAlertsEnabled]  = React.useState(false);
  const [alertsRunning,  setAlertsRunning]  = React.useState(false);
  const [alertsResult,   setAlertsResult]   = React.useState(null);

  React.useEffect(() => {
    if (IS_APPS_SCRIPT) gsRun("getPeopleAlertsConfig").then(c => setAlertsEnabled(c && c.enabled)).catch(() => {});
  }, []);

  // Workload alert settings
  const [wlEnabled,    setWlEnabled]    = React.useState(false);
  const [wlEmail,      setWlEmail]      = React.useState("");
  const [wlThreshold,  setWlThreshold]  = React.useState("30");
  const [wlCriteria,   setWlCriteria]   = React.useState("");
  const [wlSaving,     setWlSaving]     = React.useState(false);
  const [wlSaved,      setWlSaved]      = React.useState(false);

  React.useEffect(() => {
    if (IS_APPS_SCRIPT) {
      gsRun("getWorkloadAlertConfig").then(function(c) {
        if (c) {
          if (c.enabled  !== undefined) setWlEnabled(!!c.enabled);
          if (c.email)                  setWlEmail(c.email);
          if (c.threshold !== undefined) setWlThreshold(String(c.threshold || 30));
          if (c.criteria)               setWlCriteria(c.criteria);
        }
      }).catch(() => {});
    }
  }, []);

  const saveWorkloadAlertConfig = () => {
    setWlSaving(true);
    const cfg = { enabled: wlEnabled, email: wlEmail.trim(), threshold: Number(wlThreshold) || 30, criteria: wlCriteria.trim() };
    (IS_APPS_SCRIPT ? gsRun("saveWorkloadAlertConfig", cfg) : Promise.resolve())
      .then(() => { setWlSaved(true); setTimeout(() => setWlSaved(false), 3000); })
      .catch(() => {})
      .finally(() => setWlSaving(false));
  };

  const toggleAlerts = (on) => {
    setAlertsEnabled(on);
    if (IS_APPS_SCRIPT) {
      (on ? gsRun("setupPeopleAlertsSchedule", 24) : gsRun("removePeopleAlertsSchedule")).catch(() => {});
    }
  };

  const runAlertsNow = () => {
    setAlertsRunning(true); setAlertsResult(null);
    gsRun("runPeopleManagementAlerts")
      .then(r => setAlertsResult(r.sent ? "Sent — " + r.alertCount + " alert" + (r.alertCount !== 1 ? "s" : "") + " delivered" : r.reason))
      .catch(e => setAlertsResult("Error: " + (e.message || e)))
      .finally(() => setAlertsRunning(false));
  };

  React.useEffect(() => {
    setClickupDraft(settings.apiKey || "");
    setSlackDraft(settings.slackToken || "");
    setOverrideDraft(settings.slackOverrideChannel || "");
  }, [settings.apiKey, settings.slackToken, settings.slackOverrideChannel]);

  const runTest = async (type) => {
    setConnTest(s => ({ ...s, [type]: "testing" }));
    try {
      let res;
      if (type === "anthropic") {
        res = await gsRun("testAnthropicConnection");
      } else if (type === "clickup") {
        const key = clickupDraft.trim();
        if (!key) { setConnTest(s => ({ ...s, clickup: "✗ Enter a ClickUp API key first" })); return; }
        res = await gsRun("testClickUpKey", key);
      } else {
        const tok = slackDraft.trim();
        if (!tok) { setConnTest(s => ({ ...s, slack: "✗ Enter a Slack bot token first" })); return; }
        res = await gsRun("testSlackToken", tok);
      }

const ScorecardView = ({ members, analysis, onScrollToMember }) => {
  const totalOpenAll = members.reduce((s, m) => s + (m.totalOpen||0), 0);
  const avg = members.length ? Math.round(totalOpenAll / members.length) : 0;

  /* ── Scoring ── */
  const riskScore = (m) => {
    const p = m.priorityCounts || {};
    const stuck = (m.stuckTasks || []).length;
    const n = Math.max(m.totalOpen || 1, 1);
    const deadline   = Math.min(((p.urgent||0)*100 + (p.high||0)*46.7 + (p.medium||0)*13.3 + stuck*73.3) / n, 100);
    const complexity = Math.min(((p.urgent||0)*100 + (p.high||0)*66.7 + (p.medium||0)*33.3) / n, 100);
    const vol = Math.min(1 + (n-1)*0.08, 2.0);
    return Math.min((deadline*0.35 + complexity*0.25) * vol, 100);
  };
  const absorbCapacity = (m) => Math.round(Math.max(0, (avg || 8) * 1.4 - (m.totalOpen || 0)));
  const isQuietOverload = (m) => {
    const stuck = (m.stuckTasks || []).length;
    const n = m.totalOpen || 0;
    return n > 0 && n <= avg * 0.55 && stuck >= 2 && stuck / n >= 0.6;
  };
  const totalStuck = members.reduce((s, m) => s + ((m.stuckTasks || []).length), 0);
  const avgStuck = members.length ? totalStuck / members.length : 0;
  const statusFor = (m) => {
    const stuck = (m.stuckTasks || []).length;
    const high  = (m.priorityCounts && m.priorityCounts.high) || 0;
    if (stuck >= Math.max(avgStuck * 1.3, 4) || (stuck >= 3 && high >= 3)) return { tier:2, label:"Overloaded" };
    if (stuck >= Math.max(avgStuck * 0.9, 2) || high >= 2) return { tier:1, label:"Watch" };
    return { tier:0, label:"On Track" };
  };
  const ini = (name) => name.split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const byRisk     = [...members].sort((a,b) => riskScore(b) - riskScore(a));
  const byCapacity = [...members].sort((a,b) => absorbCapacity(b) - absorbCapacity(a));

  /* ── Summary counts ── */
  const overloadedCount = members.filter(m => statusFor(m).tier===2).length;
  const watchCount      = members.filter(m => statusFor(m).tier===1).length;
  const onTrackCount    = members.filter(m => statusFor(m).tier===0).length;
  const highestRisk     = byRisk[0] || null;
  const mostBlocked     = [...members].sort((a,b)=>(b.stuckTasks||[]).length-(a.stuckTasks||[]).length)[0] || null;

  /* ── Recommended actions ── */
  const teamActions = React.useMemo(function() {
    var acts = [];
    var overloaded = byRisk.filter(m => statusFor(m).tier===2 && (m.stuckTasks||[]).length>=3);
    var available  = byCapacity.filter(m => statusFor(m).tier===0 && absorbCapacity(m)>=2);
    if (overloaded.length > 0 && available.length > 0) {
      var from = overloaded[0], to = available[0];
      acts.push({ title:"Rebalance "+from.name.split(" ")[0]+" → "+to.name.split(" ")[0], why:from.name.split(" ")[0]+" has "+(from.stuckTasks||[]).length+" blocked · "+to.name.split(" ")[0]+" can absorb +"+absorbCapacity(to), name:from.name, urgent:true });
    }
    if (mostBlocked && (mostBlocked.stuckTasks||[]).length>=3) {
      acts.push({ title:"Unblock "+mostBlocked.name.split(" ")[0], why:(mostBlocked.stuckTasks||[]).length+" tasks stalled — likely a decision or dependency.", name:mostBlocked.name });
    }
    var quiet = members.filter(isQuietOverload);
    if (quiet.length > 0) {
      acts.push({ title:"Check in with "+quiet[0].name.split(" ")[0], why:"Low volume but "+(quiet[0].stuckTasks||[]).length+" tasks stuck — possible hidden pressure.", name:quiet[0].name });
    }
    return acts.slice(0,3);
  }, [members]);

  /* ── Interaction state ── */
  const [selectedMember,   setSelectedMember]   = React.useState(null);
  const [hoveredMember,    setHoveredMember]     = React.useState(null);
  const [tooltip,          setTooltip]           = React.useState(null);

  /* ── Dark design tokens ── */
  const D = {
    bg:        "#16181F",
    card:      "#1C2029",
    border:    "rgba(255,255,255,0.07)",
    borderSub: "rgba(255,255,255,0.04)",
    ink1:      "#E2E5ED",
    ink2:      "rgba(226,229,237,0.5)",
    ink3:      "rgba(226,229,237,0.28)",
    risk:      "#A63030",
    riskLight: "#C24040",
    riskGlow:  "rgba(166,48,48,0.38)",
    riskSoft:  "rgba(166,48,48,0.13)",
    warn:      "#8A621A",
    warnLight: "#A87828",
    warnSoft:  "rgba(138,98,26,0.11)",
    green:     "#1A7A5C",
    greenLight:"#22A07A",
    greenGlow: "rgba(26,122,92,0.30)",
    greenSoft: "rgba(26,122,92,0.10)",
    mono:      "'SF Mono','Menlo','Consolas',monospace",
  };
  const statusColor  = (tier) => tier===2 ? D.riskLight  : tier===1 ? D.warnLight  : D.greenLight;
  const statusGlow   = (tier) => tier===2 ? D.riskGlow   : tier===1 ? D.warnSoft   : D.greenGlow;
  const statusSoft   = (tier) => tier===2 ? D.riskSoft   : tier===1 ? D.warnSoft   : D.greenSoft;

  /* ── Map geometry ── */
  const MAP_W = 560, MAP_H = 280, PAD = 36;
  const maxOpen  = Math.max.apply(null, members.map(m => m.totalOpen||0).concat([1]));
  const maxStuck = Math.max.apply(null, members.map(m => (m.stuckTasks||[]).length).concat([1]));
  const nodeX    = (m) => PAD + ((m.totalOpen||0) / maxOpen) * (MAP_W - PAD*2);
  const nodeY    = (m) => (MAP_H - PAD) - ((m.stuckTasks||[]).length / maxStuck) * (MAP_H - PAD*2);
  const nodeR    = (m) => { var s = riskScore(m); return 10 + (s/100)*3; };
  const quadrantOf = (m) => {
    var isRight = (m.totalOpen||0) >= maxOpen/2;
    var isTop   = (m.stuckTasks||[]).length >= maxStuck/2;
    return (isTop?"t":"b")+(isRight?"r":"l");
  };

  /* cluster centroid of overloaded nodes — for glow ellipse */
  const overloadedNodes = members.filter(m => statusFor(m).tier===2);
  const clusterCx = overloadedNodes.length ? overloadedNodes.reduce((s,m)=>s+nodeX(m),0)/overloadedNodes.length : 0;
  const clusterCy = overloadedNodes.length ? overloadedNodes.reduce((s,m)=>s+nodeY(m),0)/overloadedNodes.length : 0;
  const clusterRx = overloadedNodes.length ? Math.max(40, overloadedNodes.reduce((mx,m)=>Math.max(mx,Math.abs(nodeX(m)-clusterCx)),0)+22) : 0;
  const clusterRy = overloadedNodes.length ? Math.max(28, overloadedNodes.reduce((mx,m)=>Math.max(mx,Math.abs(nodeY(m)-clusterCy)),0)+18) : 0;

  return (
    <div style={{borderRadius:14,overflow:"hidden",background:D.bg,border:"1px solid "+D.border,position:"relative"}}>
      <style>{`
        @keyframes pmPulse {
          0%   { transform: scale(1);   opacity: 0.55; }
          60%  { transform: scale(1.9); opacity: 0; }
          100% { transform: scale(1.9); opacity: 0; }
        }
        @keyframes pmNodeIn {
          from { opacity:0; transform: scale(0.6); }
          to   { opacity:1; transform: scale(1); }
        }
        @keyframes pmTipIn {
          from { opacity:0; transform: translateY(-6px) translateX(-50%); }
          to   { opacity:1; transform: translateY(0)   translateX(-50%); }
        }
      `}</style>

      {/* ── Header ── */}
      <div style={{padding:"13px 16px 11px",borderBottom:"1px solid "+D.border,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.10em",textTransform:"uppercase",color:D.ink3,marginBottom:3}}>Pressure Map</div>
          <div style={{fontSize:12,fontWeight:500,color:D.ink2,letterSpacing:"-0.01em"}}>Workload vs. blockedness across active contributors</div>
        </div>

        {/* Insight pills */}
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          {overloadedCount > 0 && (
            <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:99,background:D.riskSoft,border:"1px solid rgba(166,48,48,0.22)"}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:D.riskLight,boxShadow:"0 0 5px "+D.riskGlow}} />
              <span style={{fontSize:10,fontWeight:600,color:D.riskLight,letterSpacing:"0.02em"}}>{overloadedCount} critical</span>
            </div>
          )}
          {watchCount > 0 && (
            <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:99,background:D.warnSoft,border:"1px solid rgba(138,98,26,0.22)"}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:D.warnLight}} />
              <span style={{fontSize:10,fontWeight:600,color:D.warnLight,letterSpacing:"0.02em"}}>{watchCount} watch</span>
            </div>
          )}
          {onTrackCount > 0 && (
            <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:99,background:D.greenSoft,border:"1px solid rgba(26,122,92,0.20)"}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:D.greenLight}} />
              <span style={{fontSize:10,fontWeight:600,color:D.greenLight,letterSpacing:"0.02em"}}>{onTrackCount} on track</span>
            </div>
          )}
          {highestRisk && (
            <div style={{marginLeft:4,padding:"3px 8px",borderRadius:99,background:"rgba(255,255,255,0.04)",border:"1px solid "+D.border}}>
              <span style={{fontSize:10,color:D.ink3,letterSpacing:"0.01em"}}>Highest risk: </span>
              <span style={{fontSize:10,fontWeight:600,color:D.riskLight}}>{ini(highestRisk.name)}</span>
            </div>

const DonutChart = ({ members }) => {
  /* Questrade-inspired palette: brand orange anchor, financial navy/teal family, no repeats */
  const avatarColors = ["#E8521A","#1D3557","#2A9D8F","#6C4EB8","#2E7D5C","#C47A1E","#3A6EA8","#A63228","#1A6B8A","#7A4A9A","#5C7A3E"];
  const score = (m) => {
    const p = m.priorityCounts || {};
    const stuck = (m.stuckTasks || []).length;
    const n = Math.max(m.totalOpen || 1, 1);
    const deadline = Math.min(((p.urgent||0)*100 + (p.high||0)*46.7 + (p.medium||0)*13.3 + stuck*73.3) / n, 100);
    const complexity = Math.min(((p.urgent||0)*100 + (p.high||0)*66.7 + (p.medium||0)*33.3) / n, 100);
    const vol = Math.min(1 + (n-1)*0.08, 2.0);
    return Math.max(Math.min((deadline*0.35 + complexity*0.25) * vol, 100), 0.5);
  };
  const scores = members.map(score);
  const total = scores.reduce((a,b) => a+b, 0) || 1;

  // Build SVG donut slices
  const R = 80, r = 46, cx = 95, cy = 95;
  const circumference = 2 * Math.PI * R;
  let cumPct = 0;
  const slices = members.map((m, i) => {
    const pct = scores[i] / total;
    const startAngle = cumPct * 2 * Math.PI - Math.PI / 2;
    cumPct += pct;
    const endAngle = cumPct * 2 * Math.PI - Math.PI / 2;
    const gap = 0.018;
    const sa = startAngle + gap;
    const ea = endAngle - gap;
    const x1 = cx + R * Math.cos(sa), y1 = cy + R * Math.sin(sa);
    const x2 = cx + R * Math.cos(ea), y2 = cy + R * Math.sin(ea);
    const ix1 = cx + r * Math.cos(ea), iy1 = cy + r * Math.sin(ea);
    const ix2 = cx + r * Math.cos(sa), iy2 = cy + r * Math.sin(sa);
    const large = (ea - sa) > Math.PI ? 1 : 0;
    return { m, i, pct, color: avatarColors[i % avatarColors.length],
      path: `M${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${ix1},${iy1} A${r},${r} 0 ${large},0 ${ix2},${iy2} Z` };
  });

  const [hovered, setHovered] = React.useState(null);
  const sorted = [...members].map((m,i) => ({m,i,pct:scores[i]/total})).sort((a,b) => b.pct-a.pct);

  return (
    <div style={{display:"flex",gap:24,alignItems:"flex-start",flexWrap:"wrap"}}>
      {/* Donut SVG */}
      <div style={{flexShrink:0}}>
        <svg width="190" height="190" viewBox="0 0 190 190">
          {slices.map(s => (
            <path key={s.i} d={s.path} fill={s.color} fillOpacity={0.82}
              opacity={hovered === null || hovered === s.i ? 1 : 0.25}
              style={{transition:"opacity .15s",cursor:"pointer",filter:hovered===s.i?"brightness(1.12)":"none"}}
              onMouseEnter={() => setHovered(s.i)}
              onMouseLeave={() => setHovered(null)}
            />
          ))}
          {/* Center label — vertically centred using dominant-baseline */}
          <text x={cx} y={cy-7} textAnchor="middle" dominantBaseline="auto" style={{fontSize:22,fontWeight:800,fill:"var(--fg)",fontFamily:"inherit"}}>
            {hovered !== null ? Math.round(slices[hovered].pct*100)+"%" : members.length}
          </text>
          <text x={cx} y={cy+11} textAnchor="middle" dominantBaseline="hanging" style={{fontSize:9,fill:"var(--fg-dim)",fontFamily:"inherit",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>
            {hovered !== null ? members[hovered].name.split(" ")[0] : "members"}
          </text>
        </svg>
      </div>
      {/* Legend */}
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:6,paddingTop:8}}>
        {sorted.map(({m,i,pct}) => (
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,opacity:hovered===null||hovered===i?1:0.4,transition:"opacity .15s",cursor:"default"}}
            onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)}>
            <div style={{width:10,height:10,borderRadius:2,background:avatarColors[i%avatarColors.length],flexShrink:0}} />
            <span style={{fontSize:12,color:"var(--fg)",fontWeight:600,flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.name.split(" ")[0]}</span>
            <div style={{width:80,height:5,background:"var(--s2)",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct*100}%`,background:avatarColors[i%avatarColors.length],borderRadius:3}} />
            </div>
            <span style={{fontSize:11,fontWeight:700,color:"var(--fg-dim)",width:30,textAlign:"right"}}>{Math.round(pct*100)}%</span>
          </div>
        ))}
        <div style={{marginTop:8,fontSize:10,color:"var(--fg-dim)"}}>Share of weighted load · hover to inspect</div>
      </div>
    </div>
  );
};

/* ── Workload Pressure Map scoring ── */
const computeHeatScore = (m) => {
  const p = m.priorityCounts || {};
  const stuck = (m.stuckTasks || []).length;
  const n = Math.max(m.totalOpen || 1, 1);
  const urgentW = (p.urgent || 0);
  const highW   = (p.high   || 0);
  const medW    = (p.medium || 0);
  /* Deadline pressure: urgent=100, high=60, medium=20 */
  const deadlinePressure = Math.min(((urgentW*100 + highW*60 + medW*20) / n), 100);
  /* Complexity: urgent=100, high=70, medium=35 */
  const complexity       = Math.min(((urgentW*100 + highW*70 + medW*35) / n), 100);
  /* Stakeholder importance: proxy via high/urgent ratio */
  const stakeholder      = Math.min(((urgentW*100 + highW*50) / n), 100);
  /* Regulatory risk: proxy via stuck tasks */
  const regulatory       = Math.min((stuck / Math.max(n, 1)) * 100, 100);
  /* Base difficulty */
  const base = deadlinePressure * 0.35 + complexity * 0.25 + stakeholder * 0.25 + regulatory * 0.15;
  /* Volume share — n tasks vs team avg (computed outside) */
  const volumeShareRaw = Math.min(n / 10, 1) * 100;
  /* Stuck task penalty */
  const stuckPenalty = Math.min(stuck * 15, 100);
  /* Final heat */
  const heat = base * 0.65 + volumeShareRaw * 0.25 + stuckPenalty * 0.10;
  return Math.max(Math.min(Math.round(heat), 100), 0);
};

const heatCategory = (score) => {
  if (score >= 80) return { label: "Critical",  bg: "rgba(220,60,40,0.10)",   dot: "#DC3C28", text: "#B83020" };
  if (score >= 65) return { label: "High",       bg: "rgba(234,120,40,0.10)",  dot: "#EA7828", text: "#C45E10" };
  if (score >= 45) return { label: "Elevated",   bg: "rgba(234,186,50,0.10)",  dot: "#EAB832", text: "#A8820A" };
  if (score >= 25) return { label: "Moderate",   bg: "rgba(80,180,160,0.10)",  dot: "#50B4A0", text: "#2A8A78" };
  return                   { label: "Low",        bg: "rgba(60,130,210,0.10)",  dot: "#3C82D2", text: "#1A5AA8" };
};
/* heat gradient helpers */
const hexToRgb = (hex) => {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return r+","+g+","+b;
};
const heatColor = (score) => {
  if (score >= 80) return "#9B3535";   // deep claret
  if (score >= 65) return "#C05A32";   // burnished copper
  if (score >= 45) return "#B8912E";   // antique gold
  if (score >= 25) return "#2A8F7E";   // deep jade
  return "#3B72B8";                    // refined sapphire
};

const HeatMapView = ({ members }) => {
  const [hoveredIdx, setHoveredIdx] = React.useState(null);

  const scored = members.map(function(m, i) {
    return {
      m: m, i: i,
      heat: computeHeatScore(m),
      initials: m.name.split(/\s+/).map(function(w){ return w[0]; }).join("").slice(0,2).toUpperCase()
    };
  });
  const maxHeat = Math.max.apply(null, scored.map(function(s){ return s.heat; }).concat([1]));

  /* Halton low-discrepancy sequence for even node spread */
  const halton = function(idx, base) {
    var f = 1, r = 0, n = idx + 1;
    while (n > 0) { f /= base; r += f * (n % base); n = Math.floor(n / base); }
    return r;
  };
  const positions = scored.map(function(_, i) {
    return { x: 8 + halton(i, 2) * 84, y: 10 + halton(i, 3) * 80 };
  });

  const hovered = hoveredIdx !== null ? scored[hoveredIdx] : null;

  return (
    <div>
      <div style={{position:"relative",borderRadius:20,overflow:"hidden",
        background:"var(--bg-elev)",border:"1px solid var(--border)",
        marginBottom:8,userSelect:"none",boxShadow:"0 2px 24px rgba(0,0,0,0.04)"}}
        onMouseLeave={function(){ setHoveredIdx(null); }}>

        {/* Soft ambient blobs */}
        <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}} preserveAspectRatio="none">
          <defs>
            {scored.map(function(s, i) {
              var opacity = 0.08 + (s.heat / maxHeat) * 0.16;
              var col = heatColor(s.heat);
              return (
                <radialGradient key={i} id={"hg"+i} cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor={col} stopOpacity={opacity} />
                  <stop offset="100%" stopColor={col} stopOpacity="0" />
                </radialGradient>
              );
            })}
          </defs>
          {scored.map(function(s, i) {
            var pos = positions[i];
            var r = 12 + (s.heat / maxHeat) * 24;
            return (
              <ellipse key={i} cx={pos.x+"%"} cy={pos.y+"%"}
                rx={r+"%"} ry={(r * 0.55)+"%"}
                fill={"url(#hg"+i+")"} style={{filter:"blur(1px)"}} />
            );
          })}
        </svg>

        {/* Axis labels */}
        <div style={{position:"absolute",left:10,top:"50%",
          transform:"translateY(-50%) rotate(-90deg)",transformOrigin:"center",
          fontSize:8,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",
          color:"var(--fg-dim)",opacity:0.75,pointerEvents:"none",whiteSpace:"nowrap",zIndex:5}}>Urgency</div>
        <div style={{position:"absolute",bottom:42,left:"50%",transform:"translateX(-50%)",
          fontSize:8,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",
          color:"var(--fg-dim)",opacity:0.75,pointerEvents:"none",zIndex:5}}>Task Volume →</div>
        <div style={{position:"absolute",top:10,left:22,fontSize:8,color:"var(--fg-dim)",opacity:0.7,pointerEvents:"none",zIndex:5}}>High</div>
        <div style={{position:"absolute",bottom:42,left:22,fontSize:8,color:"var(--fg-dim)",opacity:0.7,pointerEvents:"none",zIndex:5}}>Low</div>

        {/* Nodes */}
        <div style={{position:"relative",height:260,width:"100%"}}>
          {scored.map(function(s, i) {
            var pos = positions[i];
            var isHov = hoveredIdx === i;
            var pressureRatio = s.heat / maxHeat;
            /* Node size: 34–48px */
            var nodeSize = 34 + pressureRatio * 14;
            var col = heatColor(s.heat);
            var bgOpacity = 0.13 + pressureRatio * 0.20;
            var borderOpacity = 0.28 + pressureRatio * 0.45;
            return (
              <div key={i}
                style={{position:"absolute",left:pos.x+"%",top:pos.y+"%",
                  transform:"translate(-50%,-50%)",zIndex:isHov?10:2,
                  transition:"transform .18s"}}
                onMouseEnter={function(){ setHoveredIdx(i); }}>
                {isHov && <div style={{position:"absolute",inset:-4,borderRadius:"50%",
                  boxShadow:"0 0 0 1.5px "+col+"66, 0 0 20px "+col+"30",
                  pointerEvents:"none"}} />}
                <div style={{
                  width:nodeSize,height:nodeSize,borderRadius:"50%",
                  background:"rgba("+hexToRgb(col)+","+bgOpacity+")",
                  border:"1px solid rgba("+hexToRgb(col)+","+borderOpacity+")",
                  backdropFilter:"blur(4px)",
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                  cursor:"default",transition:"transform .15s, box-shadow .15s",
                  transform:isHov?"scale(1.18)":"scale(1)",
                  boxShadow:isHov?"0 4px 20px "+col+"30":"none"
                }}>
                  <span style={{fontSize:9,fontWeight:700,color:col,lineHeight:1}}>{s.initials}</span>
                  <span style={{fontSize:7,fontWeight:600,color:col,opacity:0.8,marginTop:1}}>{s.heat}</span>
                </div>
              </div>
            );
          })}

          {/* Hover tooltip */}
          {hovered && (function() {
            var pos = positions[hovered.i];
            var p = hovered.m.priorityCounts || {};
            var stuck = (hovered.m.stuckTasks || []).length;
            var topDriver = hovered.heat >= 65 ? "Deadline pressure"
              : hovered.heat >= 45 ? "Task volume"
              : stuck > 0 ? "Blocked tasks" : "Balanced load";
            var tooltipLeft = pos.x > 60;
            return (
              <div style={{
                position:"absolute",
                left: tooltipLeft ? "auto" : (pos.x + 4) + "%",
                right: tooltipLeft ? (100 - pos.x + 3) + "%" : "auto",
                top: (pos.y - 4) + "%",
                minWidth:176, background:"var(--bg-elev)",
                border:"1px solid var(--border)", borderRadius:14,
                padding:"12px 14px", boxShadow:"0 8px 32px rgba(0,0,0,0.10)",
                zIndex:20, pointerEvents:"none"
              }}>
                <div style={{fontWeight:700,fontSize:12,color:"var(--fg)",marginBottom:3}}>{hovered.m.name}</div>
                <div style={{fontSize:10,color:"var(--fg-dim)",marginBottom:10}}>Pressure score · {hovered.heat}/100</div>
                {[
                  ["Active tasks",  hovered.m.totalOpen || 0],
                  ["Stuck",         stuck],
                  ["High priority", (p.high||0)+(p.urgent||0)],
                  ["Top driver",    topDriver],
                ].map(function(row, ri) {
                  return (
                    <div key={ri} style={{display:"flex",justifyContent:"space-between",
                      fontSize:10,color:"var(--fg-dim)",marginBottom:3}}>
                      <span>{row[0]}</span>
                      <span style={{fontWeight:600,color:"var(--fg)"}}>{row[1]}</span>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>

        {/* Legend */}
        <div style={{display:"flex",alignItems:"center",gap:10,
          padding:"8px 18px 12px",borderTop:"1px solid var(--line-soft)"}}>
          <span style={{fontSize:8,color:"var(--fg-dim)",fontWeight:600,opacity:0.75}}>Low pressure</span>
          <div style={{flex:1,height:3,borderRadius:2,
            background:"linear-gradient(90deg,#3B72B8,#2A8F7E,#B8912E,#C05A32,#9B3535)"}} />
          <span style={{fontSize:8,color:"var(--fg-dim)",fontWeight:600,opacity:0.75}}>High pressure</span>
        </div>
      </div>
    </div>
  );
};

                    <div style={{display:"flex",alignItems:"center",padding:"7px 10px",borderRight:"1px solid var(--line-soft)"}}>
