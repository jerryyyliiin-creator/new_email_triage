const DraftPane = ({ email, draft, chat, onChange, onSend, onTone, onChatSend, onCancel }) => {
  const [chatInput, setChatInput] = React.useState("");
  const [slots, setSlots] = React.useState(null);
  const [slotsLoading, setSlotsLoading] = React.useState(false);
  const [selectedSlots, setSelectedSlots] = React.useState(new Set());
  const [ccOpen, setCcOpen] = React.useState(false);
  const [bccOpen, setBccOpen] = React.useState(false);
  const [attachments, setAttachments] = React.useState([]);
  const [dragOver, setDragOver] = React.useState(false);
  const attachRef = React.useRef(null);

  function handleAttach(files) {
    var arr = Array.from(files);
    setAttachments(function(prev) {
      var names = new Set(prev.map(function(f){ return f.name; }));
      return prev.concat(arr.filter(function(f){ return !names.has(f.name); }));
    });
  }

  const fetchSlots = () => {
    if (slotsLoading) return;
    setSlotsLoading(true);
    setSelectedSlots(new Set());
    if (IS_APPS_SCRIPT) {
      gsRun("getMyAvailability", 5)
        .then(s => setSlots(s))
        .catch(() => setSlots([]))
        .finally(() => setSlotsLoading(false));
    } else {
      setTimeout(() => {
        setSlots([
          {date:"Mon, Jun 16", start:"10:00 AM", end:"11:00 AM"},
          {date:"Mon, Jun 16", start:"2:00 PM",  end:"3:00 PM"},
          {date:"Tue, Jun 17", start:"9:00 AM",  end:"10:00 AM"},
          {date:"Wed, Jun 18", start:"11:00 AM", end:"12:00 PM"},
          {date:"Thu, Jun 19", start:"3:00 PM",  end:"4:00 PM"},
        ]);
        setSlotsLoading(false);
      }, 600);
    }
  };

  const insertAvailability = () => {
    if (!slots || !slots.length) return;
    const toInsert = slots.filter((_, i) => selectedSlots.has(i));
    const list = (toInsert.length ? toInsert : slots).map(s => `• ${s.date} · ${s.start}–${s.end}`).join("\n");
    const block = "\n\nHere are some times that work for me:\n" + list + "\n\nLet me know what works best.";
    onChange((draft.text || "") + block);
    setSlots(null);
    setSelectedSlots(new Set());
  };
  if (!email) return (
    <div className="empty-context">
      <div>
        <div className="empty-context-mark">✏️</div>
        <div style={{fontWeight:600,color:"var(--fg-mute)",marginBottom:6}}>No draft active</div>
        <div>Select an email and press <code style={{fontFamily:"var(--font-mono)",fontSize:11,background:"var(--bg)",padding:"2px 5px",border:"1px solid var(--line)",borderRadius:3}}>e</code> to draft a reply</div>
      </div>
    </div>
  );

  const isStreaming = draft.streaming;
  const sendInstruction = (text) => {
    const t = (text == null ? chatInput : text).trim();
    if (!t || draft.streaming) return;
    onChatSend(t);
    setChatInput("");
  };

  return (
    <div className="draft">
      {/* Email header block — flush to card edges, own padding per row */}
      <div style={{margin:"-22px -22px 0",display:"flex",flexDirection:"column"}}>
        {/* Gmail icon + subject */}
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 22px",borderBottom:"1px solid var(--line-soft)"}}>
          <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" width="18" height="18" style={{flexShrink:0}} alt="" />
          <span style={{fontSize:12,fontWeight:600,color:"var(--fg)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Re: {email.subject}</span>
        </div>

        {/* To row */}
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 22px",borderBottom:"1px solid var(--line-soft)"}}>
          <span style={{fontSize:11,fontWeight:600,color:"var(--fg-dim)",minWidth:20}}>To</span>
          <span style={{flex:1,fontSize:12,color:"var(--fg)",background:"var(--bg-elev)",border:"1px solid var(--border)",borderRadius:99,padding:"4px 12px",display:"inline-block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{email.email}</span>
          <button onClick={() => setCcOpen(o => !o)} style={{fontSize:11,fontWeight:600,color:ccOpen?"var(--accent)":"var(--fg-dim)",background:"none",border:"none",cursor:"pointer",padding:"2px 4px",transition:"color .15s",flexShrink:0}}>Cc</button>
          <button onClick={() => setBccOpen(o => !o)} style={{fontSize:11,fontWeight:600,color:bccOpen?"var(--accent)":"var(--fg-dim)",background:"none",border:"none",cursor:"pointer",padding:"2px 4px",transition:"color .15s",flexShrink:0}}>Bcc</button>
        </div>
        {ccOpen && (
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 22px",borderBottom:"1px solid var(--line-soft)"}}>
            <span style={{fontSize:11,fontWeight:600,color:"var(--fg-dim)",minWidth:20}}>Cc</span>
            <input placeholder="Add Cc…" style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:12,color:"var(--fg)"}} />
          </div>
        )}
        {bccOpen && (
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 22px",borderBottom:"1px solid var(--line-soft)"}}>
            <span style={{fontSize:11,fontWeight:600,color:"var(--fg-dim)",minWidth:20}}>Bcc</span>
            <input placeholder="Add Bcc…" style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:12,color:"var(--fg)"}} />
          </div>
        )}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginTop:8}}>
        <span style={{fontFamily:"var(--font-mono)",fontSize:10,letterSpacing:"0.08em",color:"var(--fg-dim)",textTransform:"uppercase"}}>Tone</span>
        <div className="draft-tones">
          {["Direct", "Warm", "Formal"].map(t => (
            <button
              key={t}
              className={`draft-tone ${draft.tone === t ? "active" : ""}`}
              onClick={() => onTone(t)}
            >{t}</button>
          ))}
        </div>
      </div>

      <textarea
        className={`draft-area ${isStreaming ? "draft-streaming" : ""}`}
        value={draft.text}
        onChange={(e) => onChange(e.target.value)}
        placeholder={isStreaming ? "Claude is composing…" : "Your draft will appear here"}
        readOnly={isStreaming}
      />

      <input ref={attachRef} type="file" multiple style={{display:"none"}} onChange={function(e){ handleAttach(e.target.files); e.target.value=""; }} />
      {attachments.length > 0 && (
        <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:8}}>
          {attachments.map(function(f,i){
            return (
              <div key={i} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 9px",background:"var(--s1)",borderRadius:7,border:"1px solid var(--border)"}}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--fg-dim)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <span style={{fontSize:11,color:"var(--fg)",flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                <span style={{fontSize:10,color:"var(--fg-dim)",flexShrink:0}}>{(f.size/1024).toFixed(0)}KB</span>
                <button onClick={function(){ setAttachments(function(p){ return p.filter(function(x){ return x.name!==f.name; }); }); }} style={{background:"none",border:"none",cursor:"pointer",color:"var(--fg-dim)",padding:"0 2px",fontSize:13,lineHeight:1}}>×</button>
              </div>
            );
          })}
        </div>
      )}

      <div className="draft-foot">
        <button className="thread-btn" style={{fontSize:11,display:"flex",alignItems:"center",gap:6}} onClick={fetchSlots} disabled={slotsLoading}>
          {slotsLoading
            ? <svg width="12" height="12" viewBox="-1 -1 16 16" fill="none" stroke="currentColor" strokeWidth="2" overflow="visible" style={{animation:"spin 1s linear infinite",transformOrigin:"center"}}><path d="M12 4a5 5 0 11-1.5-3.5M12 1v3h-3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            : <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>}
          Availability
        </button>
        <button className="thread-btn" style={{fontSize:11,display:"flex",alignItems:"center",gap:5}} onClick={function(){ attachRef.current && attachRef.current.click(); }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          {attachments.length > 0 ? attachments.length + " file" + (attachments.length > 1 ? "s" : "") : "Attach"}
        </button>
        {onCancel && (
          <button className="thread-btn" style={{fontSize:11}} onClick={onCancel}>Cancel</button>
        )}
        <button className="thread-btn primary" disabled={!draft.text || isStreaming} onClick={onSend} style={{display:"flex",alignItems:"center",gap:6}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Send
        </button>
      </div>

      {slots !== null && (
        <div style={{marginTop:8}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",color:"var(--fg-dim)",marginBottom:8}}>
            {slots.length ? "Select slots to insert (or insert all)" : "No free slots found in the next 5 days"}
          </div>
          {slots.map((s, i) => (
            <div key={i} className={`avail-slot${selectedSlots.has(i) ? " selected" : ""}`}
              onClick={() => setSelectedSlots(prev => { const n = new Set(prev); n.has(i) ? n.delete(i) : n.add(i); return n; })}
            >
              <span className="avail-slot-date">{s.date}</span>
              <span className="avail-slot-time">{s.start} – {s.end}</span>
            </div>
          ))}
          {slots.length > 0 && (
            <button className="thread-btn" style={{marginTop:6,width:"100%",justifyContent:"center"}} onClick={insertAvailability}>
              Insert {selectedSlots.size > 0 ? selectedSlots.size : "all"} slot{(selectedSlots.size || slots.length) !== 1 ? "s" : ""} into draft
            </button>
          )}
        </div>
      )}

      {/* AI chat refine */}
      <div className="draft-chat">
        <div className="draft-chat-head">
          <span className="draft-chat-label">
            <span className="draft-chat-spark"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Claude_AI_symbol.svg" width="13" height="13" style={{filter:"invert(1)"}} alt="" /></span> Refine with QuestFlow
          </span>
          {chat && chat.history && chat.history.length > 0 && (
            <span style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--fg-dim)"}}>
              {chat.history.length} turn{chat.history.length === 1 ? "" : "s"}
            </span>
          )}
        </div>

        {chat && chat.history && chat.history.length > 0 && (
          <div className="draft-chat-history">
            {chat.history.map((m, i) => (
              <div key={i} className={`chat-msg chat-msg-${m.role}`}>
                <div className="chat-msg-avatar">{m.role === "user" ? "U" : <img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Claude_AI_symbol.svg" width="13" height="13" style={{filter:"invert(1)"}} alt="" />}</div>
                <div className="chat-msg-bubble">{m.text}</div>
              </div>
            ))}
            {chat.thinking && (
              <div className="chat-msg chat-msg-claude">
                <div className="chat-msg-avatar"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Claude_AI_symbol.svg" width="13" height="13" style={{filter:"invert(1)"}} alt="" /></div>
                <div className="chat-msg-bubble chat-thinking">
                  <span /><span /><span />
                </div>
              </div>
            )}
          </div>
        )}

        <div className="draft-chat-suggestions">
          {["Make it shorter", "More casual", "More formal", "Add a question", "Be more direct"].map(s => (
            <button key={s} className="quick-reply" onClick={() => sendInstruction(s)} disabled={draft.streaming}>{s}</button>
          ))}
        </div>

        <div className="draft-chat-input">
          <input
            placeholder="Ask Claude to change something…"
            value={chatInput}
            onChange={(e) => setChatInput(e.target.value)}

              if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendInstruction();
              }
            }}
            disabled={draft.streaming}
          />
          <button
            className="chat-send-btn"
            onClick={() => sendInstruction()}
            disabled={!chatInput.trim() || draft.streaming}
            title="Send (Enter)"
          >↑</button>
        </div>
      </div>
    </div>
  );
};

const TasksPane = ({ tasks, toggleTask, clearDone }) => {
  const active = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);
  return (
    <div>
      <div className="tracker-section">
        <div className="tracker-head">
          <div className="tracker-title">Active · {active.length}</div>
          <span style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--fg-dim)"}}>Auto-extracted by Claude</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:0,padding:0}}>
          {active.map(t => (
            <div key={t.id} className={`task ${t.done ? "done" : ""}`}>
              <button className={`task-check ${t.done ? "done" : ""}`} onClick={() => toggleTask(t.id)}>
                {t.done && <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2 2 4-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </button>
              <div className="task-body">
                <div className="task-text">{t.text}</div>
                <div className="task-meta">
                  <span className={`task-pri ${t.priority}`}>{t.priority}</span>
                  <span className="task-due">⏱ {t.due}</span>
                  <span className="task-source">from {t.source}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {done.length > 0 && (
        <div className="tracker-section">
          <div className="tracker-head">
            <div className="tracker-title">Done · {done.length}</div>
            <button className="tracker-add" onClick={clearDone}>Clear</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:0,padding:0}}>
            {done.map(t => (
              <div key={t.id} className={`task done`}>
                <button className={`task-check done`} onClick={() => toggleTask(t.id)}>
                  <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2 2 4-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
                <div className="task-body">
                  <div className="task-text">{t.text}</div>
                  <div className="task-meta">
                    <span className="task-source">from {t.source}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

const TrackerPane = ({ vips, followups, onAddVip, onRemoveVip, onAddFollowup, onRemoveFollowup }) => {
  const [adding, setAdding] = React.useState(false);
  const [val, setVal] = React.useState("");
  const [trackingForm, setTrackingForm] = React.useState(false);
  const [trackTo, setTrackTo] = React.useState("");
  const [trackSubject, setTrackSubject] = React.useState("");
  const [trackHours, setTrackHours] = React.useState("48");
  const submitTrack = () => {
    if (!trackTo.trim()) return;
    onAddFollowup({ to: trackTo.trim(), subject: trackSubject.trim() || "(no subject)", hours: Number(trackHours) || 48 });
    setTrackTo(""); setTrackSubject(""); setTrackHours("48"); setTrackingForm(false);
  };
  const submit = () => {
    const v = val.trim();
    if (!v) return;
    onAddVip(v);
    setVal("");
    setAdding(false);
  };
  return (
    <div>
      <div className="tracker-section">
        <div className="tracker-head">
          <div className="tracker-title">VIP senders · {vips.length}</div>
          {!adding && <button className="tracker-add" onClick={() => setAdding(true)}>+ Add</button>}
        </div>
        {adding && (
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <input
              autoFocus
              value={val}
              onChange={(e) => setVal(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") submit(); if (e.key === "Escape") { setAdding(false); setVal(""); } }}
              placeholder="email@domain.com  or  @domain.com"
              style={{flex:1,background:"var(--bg-elev)",border:"1px solid var(--border)",borderRadius:999,padding:"8px 14px",fontSize:12,color:"var(--fg)",outline:"none"}}
            />
            <button className="tracker-add" onClick={submit} style={{background:"var(--accent)",color:"#04140d",fontWeight:800,borderColor:"transparent"}}>Save</button>
            <button className="tracker-add" onClick={() => { setAdding(false); setVal(""); }}>×</button>
          </div>
        )}
        {vips.map(v => (
          <div key={v.email} className="vip-row">
            <div className="vip-avatar">{initialsOf(v.name)}</div>
            <div>
              <div className="vip-name">{v.name}</div>
              <div className="vip-meta">{v.role} · {v.email}</div>
            </div>
            <div className="vip-actions" style={{display:"flex",gap:6,alignItems:"center"}}>
              <button
                className="tracker-add"
                title="Remove VIP"
                style={{padding:"3px 8px",fontSize:11}}
                onClick={() => onRemoveVip(v.email)}
              >×</button>
            </div>
          </div>
        ))}
      </div>

      <div className="tracker-section">
        <div className="tracker-head">
          <div className="tracker-title">Pending follow-ups · {followups.length}</div>
          {!trackingForm && <button className="tracker-add" onClick={() => setTrackingForm(true)}>+ Track</button>}
        </div>
        {trackingForm && (
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
            <input autoFocus value={trackTo} onChange={e => setTrackTo(e.target.value)} placeholder="Recipient email or name"
              style={{background:"var(--bg-elev)",border:"1px solid var(--border)",borderRadius:999,padding:"8px 14px",fontSize:12,color:"var(--fg)",outline:"none"}} />
            <input value={trackSubject} onChange={e => setTrackSubject(e.target.value)} placeholder="Subject (optional)"
              style={{background:"var(--bg-elev)",border:"1px solid var(--border)",borderRadius:999,padding:"8px 14px",fontSize:12,color:"var(--fg)",outline:"none"}} />
            <select value={trackHours} onChange={e => setTrackHours(e.target.value)}
              style={{background:"var(--bg-elev)",border:"1px solid var(--border)",borderRadius:999,padding:"8px 14px",fontSize:12,color:"var(--fg)",outline:"none"}}>
              <option value="24">Follow up in 24h</option>
              <option value="48">Follow up in 48h</option>
              <option value="72">Follow up in 3 days</option>
              <option value="168">Follow up in 1 week</option>
            </select>
            <div style={{display:"flex",gap:6}}>
              <button className="tracker-add" onClick={submitTrack} style={{background:"var(--accent)",color:"#04140d",fontWeight:800,borderColor:"transparent"}}>Save</button>
              <button className="tracker-add" onClick={() => setTrackingForm(false)}>×</button>
            </div>
          </div>
        )}
        {followups.map(f => (
          <div key={f.id} className="followup-row">
            <div className="vip-avatar" style={{background:"var(--bg-elev-2)"}}>↗</div>
            <div>
              <div className="followup-to">{f.to}</div>
              <div className="followup-meta">{f.subject} · sent {f.sent}</div>
            </div>
            <div className="followup-actions" style={{display:"flex",gap:6,alignItems:"center"}}>
              <span className={`followup-due ${f.overdue ? "overdue" : ""}`}>{f.due}</span>
              <button className="tracker-add" style={{padding:"3px 8px",fontSize:11}} onClick={() => onRemoveFollowup(f.id)}>×</button>
            </div>
          </div>
        ))}
      </div>

      <div className="tracker-section">
        <div className="tracker-head">
          <div className="tracker-title">How it works</div>
        </div>
        <div style={{fontSize:12,color:"var(--fg-mute)",lineHeight:1.55}}>
          Sending a reply automatically tracks it. If they don't respond within your follow-up window, the thread reappears in your inbox with an "Overdue" chip.
        </div>
      </div>
    </div>
  );
};

              </select>
              <select className="rule-select" value={form.priority} onChange={e => setForm(f => ({ ...f, priority: Number(e.target.value) }))}>

const CreateEnvelopeModal = ({ email, onClose, onSent }) => {
  const [draft, setDraft] = React.useState(null);
  const [generating, setGenerating] = React.useState(true);
  const [sending, setSending] = React.useState(false);
  const [sent, setSent] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [uploadedFiles, setUploadedFiles] = React.useState([]);
  const [dragOver, setDragOver] = React.useState(false);
  const [editingEmail, setEditingEmail] = React.useState(false);
  const [editingDocType, setEditingDocType] = React.useState(false);
  const [showApproval, setShowApproval] = React.useState(true);
  const fileInputRef = React.useRef(null);
  const emailInputRef = React.useRef(null);
  const docTypeInputRef = React.useRef(null);

  function loadDraft() {
    setGenerating(true);
    setError(null);
    if (!IS_APPS_SCRIPT) {
      setTimeout(function() {
        setDraft({
          recipientName: (email && email.sender) || "John Smith",
          recipientEmail: "john@example.com",
          docType: "Service Agreement",
          approvalContext: "Approved by Sarah Chen (CFO)",
          coverMsg: "Hi John,\n\nPlease find attached the Service Agreement for your review and signature. This has been approved by Sarah Chen (CFO) and is ready for your execution.\n\nKindly review the document at your earliest convenience and sign where indicated.\n\nThank you for your prompt attention to this matter.\n\nBest regards,\nZach"
        });
        setGenerating(false);
      }, 900);
      return;
    }
    gsRun("prepareEnvelopeDraft", email && email.id)
      .then(function(r) { setDraft(r); setGenerating(false); })
      .catch(function(e) { setError("Could not prepare draft: " + (e.message || e)); setGenerating(false); });
  }

  React.useEffect(function() { loadDraft(); }, []);

  React.useEffect(function() {
    if (editingEmail && emailInputRef.current) emailInputRef.current.focus();
  }, [editingEmail]);

  React.useEffect(function() {
    if (editingDocType && docTypeInputRef.current) docTypeInputRef.current.focus();
  }, [editingDocType]);

  function handleFiles(files) {
    var arr = Array.from(files);
    setUploadedFiles(function(prev) {
      var names = new Set(prev.map(function(f){ return f.name; }));
      return prev.concat(arr.filter(function(f){ return !names.has(f.name); }));
    });
  }

  function removeFile(name) {
    setUploadedFiles(function(prev){ return prev.filter(function(f){ return f.name !== name; }); });
  }

  function handleSend() {
    if (!draft || !draft.coverMsg || !draft.coverMsg.trim() || sending || generating) return;
    setSending(true);
    var payload = { recipientName: draft.recipientName, recipientEmail: draft.recipientEmail, coverMsg: draft.coverMsg.trim() };
    gsRun("sendEnvelopeWithFiles", payload)
      .then(function() { setSent(true); setSending(false); if (onSent) onSent(); })
      .catch(function(e) { setError(e.message || "Failed to send"); setSending(false); });
  }

  var canSend = draft && draft.coverMsg && draft.coverMsg.trim() && !sending && !generating;
  var btnStyle = {display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"10px 18px",fontSize:12,fontWeight:700,borderRadius:10,border:"none",cursor:"pointer",transition:"all .15s"};

  }

    <div style={{position:"fixed",inset:0,zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.28)",backdropFilter:"blur(6px)"}}>
      <div style={{background:"var(--bg-elev)",border:"1px solid var(--border)",borderRadius:20,boxShadow:"0 24px 80px rgba(0,0,0,0.22)",width:"min(600px,calc(100vw-32px))",display:"flex",flexDirection:"column",overflow:"hidden",animation:"fadeInUp .18s ease"}}>

        {/* Header */}

          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700,color:"var(--fg)"}}>Create Envelope</div>
            <div style={{fontSize:11,color:"var(--fg-dim)",marginTop:1}}>
              {generating ? "Claude is preparing the envelope…" : ("Sending to " + ((draft && draft.recipientName) || "recipient"))}
            </div>
          </div>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:7,border:"1px solid var(--border)",background:"var(--s1)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--fg-dim)",fontSize:16,fontWeight:300}}>×</button>

    settings: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
  };
  const commands = [
    { id:"v_inbox",    group:"Navigation", icon:NAV_SVGS.inbox,    label:"Go to Inbox",        run: () => onSetView("inbox") },
    { id:"v_tasks",    group:"Navigation", icon:NAV_SVGS.tasks,    label:"Go to ClickUp Log", run: () => onSetView("tasks") },
    { id:"v_team",     group:"Navigation", icon:NAV_SVGS.team,     label:"Go to Team Hub",   run: () => onSetView("team") },
    { id:"v_docusign", group:"Navigation", icon:NAV_SVGS.docusign, label:"Go to DocuSign",      run: () => onSetView("docusign") },

    { id:"v_settings", group:"Navigation", icon:NAV_SVGS.settings, label:"Go to Settings",     run: () => onSetView("settings") },
  ];

    id: "e_" + e.id,
    group: "Jump to email",
    icon: "✉",
    label: e.subject,
    meta: e.sender + " · " + e.time,
    run: () => onSelectEmail(e.id),
  }));

  const all = [...commands, ...emailItems];
  const filtered = q.trim()
    ? all.filter(c => (c.label + " " + c.meta).toLowerCase().includes(q.toLowerCase()))
    : all;

  const groups = filtered.reduce((acc, c) => {
    (acc[c.group] = acc[c.group] || []).push(c);
    return acc;
  }, {});

  const flat = filtered;
  const handleKey = (e) => {
    if (e.key === "ArrowDown") { e.preventDefault(); setCursor(c => Math.min(flat.length - 1, c + 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setCursor(c => Math.max(0, c - 1)); }
    else if (e.key === "Enter") {
      e.preventDefault();
      const item = flat[cursor];
      if (item) { item.run(); onClose(); }
    } else if (e.key === "Escape") {
      onClose();
    }
  };

  if (!open) return null;

  let idx = -1;
  return (
    <div className="cmdk-overlay" onClick={onClose}>
      <div className="cmdk" onClick={(e) => e.stopPropagation()}>

          className="cmdk-input"

          value={q}
          onChange={(e) => { setQ(e.target.value); setCursor(0); }}
          onKeyDown={handleKey}
        />

          {Object.keys(groups).map(g => (
            <div key={g}>
              <div className="cmdk-group-label">{g}</div>
              {groups[g].map(c => {
                idx++;
                const active = idx === cursor;
                return (
                  <div
                    key={c.id}
                    className={`cmdk-item ${active ? "active" : ""}`}
                    onClick={() => { c.run(); onClose(); }}
                    onMouseEnter={() => setCursor(flat.indexOf(c))}
                  >
                    <span className="cmdk-item-icon">{c.icon}</span>
                    <span className="cmdk-item-label">{c.label}</span>
                    <span className="cmdk-item-meta">{c.meta}</span>
                  </div>
                );
              })}
            </div>
          ))}
          {flat.length === 0 && (
            <div style={{padding:"24px 14px",textAlign:"center",color:"var(--fg-dim)",fontSize:13}}>
              No matches for "{q}"
            </div>
          )}
        </div>
        <div className="cmdk-foot">
          <span><span className="cmdk-kbd">↑↓</span> navigate</span>
          <span><span className="cmdk-kbd">↵</span> select</span>
          <span><span className="cmdk-kbd">esc</span> close</span>
        </div>
      </div>
    </div>
  );
};

window.CommandPalette = CommandPalette;
</script>
<script type="text/babel" data-presets="react">/* Main app — wires everything together */

const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ---- Backend adapter ----
const IS_APPS_SCRIPT = typeof google !== "undefined" && google.script && google.script.run;
const gsRun = (fn, ...args) => new Promise((resolve, reject) => {
  if (!IS_APPS_SCRIPT) { reject(new Error("Not in Apps Script")); return; }
  google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn](...args);
});

// initialsOf defined in context.jsx — reuse

const timeAgo = (iso) => {
  if (!iso) return "—";
  const ms = Date.now() - new Date(iso).getTime();
  const m = Math.floor(ms / 60000);
  if (m < 1) return "now";
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  const d = Math.floor(h / 24);
  return d + "d ago";
};

const PERSONAL_DOMAINS = new Set([
  "gmail.com","googlemail.com","yahoo.com","yahoo.ca","yahoo.co.uk",
  "hotmail.com","outlook.com","outlook.ca","live.com","msn.com",
  "icloud.com","me.com","mac.com","aol.com","protonmail.com",
  "proton.me","fastmail.com","tutanota.com","zoho.com",
]);

const faviconFor = (emailAddr) => {
  if (!emailAddr) return null;
  const domain = String(emailAddr).split("@").pop().trim().toLowerCase();
  if (!domain || !domain.includes(".")) return null;
  if (PERSONAL_DOMAINS.has(domain)) return null;   // show initials for personal addresses
  return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=128`;
};

const cleanSenderName = (raw) => {
  if (!raw) return raw;
  let n = raw.trim();
  n = n.replace(/^["'`]+|["'`]+$/g, '').trim();        // strip wrapping quotes (any position)
  n = n.replace(/["'`]/g, '').trim();                   // strip any remaining stray quotes
  n = n.replace(/\s*\[.*?\]\s*$/, '').trim();           // strip [bot], [noreply], etc.
  n = n.replace(/\s*\((?:shared|noreply|no.reply|via\s+.+?)\)\s*$/i, '').trim();
  n = n.replace(/\s+via\s+.+$/i, '').trim();            // strip "via SomePlatform"
  return n || raw.trim();
};

const mapServerEmail = (e) => ({
  id: e.id,

  subject: e.subject || "(no subject)",
  preview: e.summary || "",

});

});

      if (action && action.startsWith("snooze:")) {
        const hours = Number(action.split(":")[1]);

        setFollowups(prev => [
          ...affected.map(e => ({
            id: e.id, subject: e.subject, sender: e.sender,

    try {

        // returning { draft: "..." }. See chat block below for the Code.gs snippet.
        const result = await gsRun("refineDraft", selectedEmail.id, draft.text, instruction, draft.tone);
        nextDraft = (result && result.draft) || "";

        // Local mock: tweak the existing draft heuristically so the UX is testable.
        const base = draft.text || TONE_DRAFTS[draft.tone || "Warm"](selectedEmail);
        const i = instruction.toLowerCase();
        if (i.includes("short")) nextDraft = base.split("\n\n").slice(0, 2).join("\n\n");

      if (!result || !result.tasks || !result.tasks.length) { pushToast("No action items found in this email"); return; }

      let listName = null;
      for (const l of (clickupSettings.lists || [])) {
        if (l.id === listId) { listName = l.name; break; }
        const sub = (l.sublists||[]).find(sl => sl.id === listId);
        if (sub) { listName = `${l.name} / ${sub.name}`; break; }
      }
      pushToast(`✓ ${count} task${count === 1 ? "" : "s"} added to ClickUp${listName ? ` → ${listName}` : ""}`);
      gsRun("getTaskHistory").then(h => Array.isArray(h) && setTaskHistory(h)).catch(() => {});

    }

  const loadTeamBrief = useCallback(function(listId, _retryCount) {
    if (!IS_APPS_SCRIPT) { pushToast("Team Hub requires Gmail context"); return; }
    var retryCount = _retryCount || 0;
    setTeamLoading(true);
    var settled = false;
    var timer = setTimeout(function() {
      if (!settled) {
        settled = true;
        setTeamLoading(false);
        if (retryCount < 2) {
          pushToast("Team Hub timed out — retrying…");
          setTimeout(function(){ loadTeamBrief(listId, retryCount + 1); }, 2000);
        } else {
          pushToast("Team Hub timed out — try again");
        }
      }
    }, 55000);
    gsRun("getTeamBrief", listId || selectedTeamList || '')
      .then(function(result) {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        // If result has no members but we have a cached brief, auto-retry once
        var hasMembers = result && result.members && result.members.length > 0;
        var hadMembers = teamBriefRef.current && teamBriefRef.current.members && teamBriefRef.current.members.length > 0;
        if (!hasMembers && hadMembers && retryCount < 2) {
          setTeamLoading(false);
          pushToast("Incomplete data — retrying…");
          setTimeout(function(){ loadTeamBrief(listId, retryCount + 1); }, 2000);
          return;
        }
        // If new result has fewer members than cached, merge to avoid dropping people
        if (hasMembers && hadMembers) {
          var cached = teamBriefRef.current.members;
          var newEmails = new Set(result.members.map(function(m){ return m.email; }));
          var missing = cached.filter(function(m){ return m.email && !newEmails.has(m.email); });
          if (missing.length > 0 && retryCount < 2) {
            setTeamLoading(false);
            pushToast("Incomplete data — retrying…");
            setTimeout(function(){ loadTeamBrief(listId, retryCount + 1); }, 2000);
            return;
          }
        }
        teamBriefRef.current = result;
        setTeamBrief(result);
        setTeamLastRefreshed(new Date());
      })
      .catch(function(e) {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        if (retryCount < 2) {
          pushToast("Team Hub error — retrying…");
          setTimeout(function(){ loadTeamBrief(listId, retryCount + 1); }, 3000);
        } else {

          { value: "banner", label: "Banner" },
          { value: "hero",   label: "Hero"   },
          { value: "hidden", label: "Hidden" },
        ]}
      />
      <TweakRadio
        label="Motion"
        value={tw.motion}
        onChange={(v) => setTweak("motion", v)}
        options={[
          { value: "subtle", label: "Subtle" },
          { value: "off",    label: "Off"    },
        ]}
      />
    </TweakSection>
  </TweaksPanel>
);

const AccentHueSwatches = ({ value, onChange }) => {
  const hues = [162, 200, 240, 280, 25, 80];
  return (
    <div style={{display:"flex",gap:6,padding:"4px 0"}}>
      {hues.map(h => (
        <button
          key={h}
          onClick={() => onChange(h)}
          style={{
            width: 26, height: 26, borderRadius: "50%",
            background: `oklch(0.74 0.13 ${h})`,
            border: value === h ? "2px solid var(--fg)" : "1px solid var(--line)",
            cursor: "pointer",
          }}
        />
      ))}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
