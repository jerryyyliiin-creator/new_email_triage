<script type="text/babel" data-presets="react">/* Command palette (⌘K) + Focus mode */

const CommandPalette = ({ open, onClose, emails, onSelectEmail, onAction, onSetView, onToggleFocus }) => {
  const [q, setQ] = React.useState("");
  const [cursor, setCursor] = React.useState(0);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (open) {
      setQ("");
      setCursor(0);
      setTimeout(() => inputRef.current && inputRef.current.focus(), 30);
    }
  }, [open]);

  const commands = [
    { id:"focus", group:"Actions", icon:"⚡", label:"Enter focus mode", meta:"Cycle through attention queue", run: () => onToggleFocus() },
    { id:"v_inbox", group:"Navigation", icon:"📥", label:"Go to inbox", meta:"G then I", run: () => onSetView("inbox") },
    { id:"v_attn", group:"Navigation", icon:"⚡", label:"Go to attention queue", meta:"G then A", run: () => onSetView("attention") },
    { id:"v_tasks", group:"Navigation", icon:"✓", label:"Go to tasks", meta:"G then T", run: () => onSetView("tasks") },
    { id:"v_vips", group:"Navigation", icon:"★", label:"Go to VIPs & follow-ups", meta:"", run: () => onSetView("vips") },
  ];

  const emailItems = emails.slice(0, 8).map(e => ({
    id: "e_" + e.id,
    group: "Jump to email",
    icon: "✉",
    label: e.subject,
    meta: e.sender + " · " + e.time,
    run: () => onSelectEmail(e.id),
  }));

  const all = [...commands, ...emailItems];
  const filtered = q.trim()
    ? all.filter(c => (c.label + " " + c.meta).toLowerCase().includes(q.toLowerCase()))
    : all;

  const groups = filtered.reduce((acc, c) => {
    (acc[c.group] = acc[c.group] || []).push(c);
    return acc;
  }, {});

  const flat = filtered;
  const handleKey = (e) => {
    if (e.key === "ArrowDown") { e.preventDefault(); setCursor(c => Math.min(flat.length - 1, c + 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setCursor(c => Math.max(0, c - 1)); }
    else if (e.key === "Enter") {
      e.preventDefault();
      const item = flat[cursor];
      if (item) { item.run(); onClose(); }
    } else if (e.key === "Escape") {
      onClose();
    }
  };

  if (!open) return null;

  let idx = -1;
  return (
    <div className="cmdk-overlay" onClick={onClose}>
      <div className="cmdk" onClick={(e) => e.stopPropagation()}>
        <input
          ref={inputRef}
          className="cmdk-input"
          placeholder="Search commands, emails, people…"
          value={q}
          onChange={(e) => { setQ(e.target.value); setCursor(0); }}
          onKeyDown={handleKey}
        />
        <div className="cmdk-results">
          {Object.keys(groups).map(g => (
            <div key={g}>
              <div className="cmdk-group-label">{g}</div>
              {groups[g].map(c => {
                idx++;
                const active = idx === cursor;
                return (
                  <div
                    key={c.id}
                    className={`cmdk-item ${active ? "active" : ""}`}
                    onClick={() => { c.run(); onClose(); }}
                    onMouseEnter={() => setCursor(flat.indexOf(c))}
                  >
                    <span className="cmdk-item-icon">{c.icon}</span>
                    <span className="cmdk-item-label">{c.label}</span>
                    <span className="cmdk-item-meta">{c.meta}</span>
                  </div>
                );
              })}
            </div>
          ))}
          {flat.length === 0 && (
            <div style={{padding:"24px 14px",textAlign:"center",color:"var(--fg-dim)",fontSize:13}}>
              No matches for "{q}"
            </div>
          )}
        </div>
        <div className="cmdk-foot">
          <span><span className="cmdk-kbd">↑↓</span> navigate</span>
          <span><span className="cmdk-kbd">↵</span> select</span>
          <span><span className="cmdk-kbd">esc</span> close</span>
        </div>
      </div>
    </div>
  );
};

const FocusMode = ({ emails, onExit, onAction, onOpenDraft }) => {
  const [idx, setIdx] = React.useState(0);
  const items = emails.filter(e => (e.reasons && e.reasons.length) || e.category === "escalation" || e.category === "action_required");

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight" || e.key === "j") { setIdx(i => Math.min(items.length - 1, i + 1)); }
      else if (e.key === "ArrowLeft" || e.key === "k") { setIdx(i => Math.max(0, i - 1)); }
      else if (e.key === "Escape") onExit();
      else if (e.key === "r") { onAction(items[idx].id, "resolve"); setIdx(i => Math.min(items.length - 2, i)); }
      else if (e.key === "t") { onAction(items[idx].id, "trash"); setIdx(i => Math.min(items.length - 2, i)); }
      else if (e.key === "e") { onOpenDraft(items[idx]); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [idx, items, onAction, onExit, onOpenDraft]);

  if (!items.length) return (
    <div className="focus-stage">
      <div className="focus-head">
        <div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--fg-dim)",letterSpacing:"0.08em",textTransform:"uppercase"}}>Focus mode</div>
        <div className="focus-progress" />
        <button className="thread-btn" onClick={onExit}>Exit (esc)</button>
      </div>
      <div className="focus-card-wrap">
        <div className="focus-card" style={{textAlign:"center"}}>
          <div style={{fontSize:32,marginBottom:12}}>🌿</div>
          <div className="focus-subject">Inbox zero in attention</div>
          <div className="focus-body" style={{textAlign:"center"}}>Nothing critical right now. Take a break or check the full inbox.</div>
          <button className="thread-btn primary" onClick={onExit} style={{margin:"0 auto"}}>Back to inbox</button>
        </div>
      </div>
    </div>
  );

  const email = items[idx];
  const thread = email.thread || [{ from: email.sender, text: email.preview, time: email.time }];

  return (
    <div className="focus-stage">
      <div className="focus-head">
        <div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--fg-dim)",letterSpacing:"0.08em",textTransform:"uppercase"}}>
          Focus · {idx + 1} of {items.length}
        </div>
        <div className="focus-progress">
          {items.map((_, i) => (
            <div key={i} className={`focus-pip ${i < idx ? "done" : ""} ${i === idx ? "current" : ""}`} />
          ))}
        </div>
        <button className="thread-btn" onClick={onExit}>Exit <span className="focus-kbd-hint">esc</span></button>
      </div>

      <div className="focus-card-wrap">
        <div className="focus-card">
          <div className="focus-from">
            <div className="focus-avatar">{email.avatar}</div>
            <div>
              <div className="focus-from-name">{email.sender} {email.vip && <span style={{color:"oklch(0.85 0.15 80)"}}>★</span>}</div>
              <div className="focus-from-meta">{email.email} · {email.time}</div>
            </div>
            <div style={{marginLeft:"auto",display:"flex",gap:6}}>
              <span className="thread-meta-pill" style={{"--c": CAT_VAR[email.category]}}>{CAT_LABEL[email.category]}</span>
              {(email.reasons||[]).slice(0,2).map(r => (
                <span key={r} className="thread-meta-pill" style={{"--c": "var(--fg-mute)"}}>{r}</span>
              ))}
            </div>
          </div>
          <div className="focus-subject">{email.subject}</div>
          <div className="focus-body">{thread[0].text}</div>
        </div>
      </div>

      <div className="focus-foot">
        <button className="focus-foot-btn" onClick={() => setIdx(i => Math.max(0, i - 1))} disabled={idx === 0}>← Prev <span className="focus-kbd-hint">k</span></button>
        <button className="focus-foot-btn" onClick={() => { onAction(email.id, "trash"); }}>🗑 Trash <span className="focus-kbd-hint">t</span></button>
        <button className="focus-foot-btn" onClick={() => { onOpenDraft(email); }}>✏️ Reply <span className="focus-kbd-hint">e</span></button>
        <button className="focus-foot-btn primary" onClick={() => { onAction(email.id, "resolve"); }}>✓ Resolve <span className="focus-kbd-hint">r</span></button>
        <button className="focus-foot-btn" onClick={() => setIdx(i => Math.min(items.length - 1, i + 1))} disabled={idx === items.length - 1}>Next → <span className="focus-kbd-hint">j</span></button>
      </div>
    </div>
  );
};

window.CommandPalette = CommandPalette;
window.FocusMode = FocusMode;
</script>
<script type="text/babel" data-presets="react">/* Main app — wires everything together */

const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ---- Backend adapter ----
const IS_APPS_SCRIPT = typeof google !== "undefined" && google.script && google.script.run;
const gsRun = (fn, ...args) => new Promise((resolve, reject) => {
  if (!IS_APPS_SCRIPT) { reject(new Error("Not in Apps Script")); return; }
  google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn](...args);
});

// initialsOf defined in context.jsx — reuse

const timeAgo = (iso) => {
  if (!iso) return "—";
  const ms = Date.now() - new Date(iso).getTime();
  const m = Math.floor(ms / 60000);
  if (m < 1) return "now";
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  const d = Math.floor(h / 24);
  return d + "d ago";
};

const mapServerEmail = (e) => ({
  id: e.id,
  sender: e.sender_name || e.sender_email || "(unknown)",
  email: e.sender_email || "",
  avatar: initialsOf(e.sender_name || e.sender_email),
  subject: e.subject || "(no subject)",
  preview: e.summary || "",
  time: timeAgo(e.date),
  timestamp: e.date ? new Date(e.date).getTime() : Date.now(),
  category: e.category || "low_priority",
  priority: e.priority || 1,
  unread: true,
  reasons: e.attentionReasons || [],
  vip: !!(e.attentionSignals && e.attentionSignals.vip),
  thread: null,
  photo: e.photo,
  isFollowup: !!e.isFollowup,
  hasFollowup: !!e.hasFollowup,
});

const mapTask = (t) => ({
  id: t.id,
  text: t.description || "(no description)",
  priority: t.priority || "medium",
  due: t.dueDate ? new Date(t.dueDate).toLocaleDateString() : "—",
  source: t.sender_name || t.subject || "—",
  done: !!t.done,
});

const mapVip = (s) => ({
  name: s,
  email: s,
  role: String(s).startsWith("@") ? "Domain rule" : "VIP sender",
  last: "—",
});

// ─── Logo configuration ────────────────────────────────────────────────────
// To use a custom logo image (e.g. your company logo): paste its URL below.
// Leave as "" to use the default "T" letter mark.
// Example: const LOGO_URL = "https://example.com/your-logo.png";
const LOGO_URL = "";
// ───────────────────────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accentHue": 162,
  "density": "comfortable",
  "attentionStyle": "banner",
  "motion": "subtle"
}/*EDITMODE-END*/;

const TONE_DRAFTS = {
  Direct: (e) => `Hi ${e.sender.split(" ")[0]},\n\nGot it — here's where I am:\n\n• ${e.subject.replace(/^(re:|fwd:)\s*/i, "")} — handled.\n• Will keep you posted as it moves.\n\nLet me know if anything else.\n\nJamie`,
  Warm: (e) => `Hi ${e.sender.split(" ")[0]},\n\nThanks for the note — appreciate you flagging this.\n\nI'll take a look and get back to you with specifics by EOD. If there's anything urgent in the meantime, drop me a line.\n\nBest,\nJamie`,
  Formal: (e) => `Dear ${e.sender.split(" ")[0]},\n\nThank you for your email regarding ${e.subject.toLowerCase()}.\n\nI have reviewed the matter and will provide a substantive response within one business day. Please reach out should you require anything in the interim.\n\nKind regards,\nJamie Tran`,
};

const App = () => {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweaks to <html>
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", tw.theme);
    document.documentElement.setAttribute("data-density", tw.density);
    document.documentElement.setAttribute("data-motion", tw.motion === "off" ? "off" : "on");
    document.documentElement.style.setProperty("--accent-h", tw.accentHue);
  }, [tw.theme, tw.density, tw.motion, tw.accentHue]);

  // Core state
  const [emails, setEmails] = useState(() => SCENARIOS.busy.emails);
  const sub = SCENARIOS.busy.sub;
  const [view, setView] = useState("inbox");
  const [activeTab, setActiveTab] = useState("all");
  const [activeCat, setActiveCat] = useState(null);
  const [search, setSearch] = useState("");
  const [selectedId, setSelectedId] = useState(null);
  const [checked, setChecked] = useState(new Set());
  const [lastChecked, setLastChecked] = useState(null);
  const [dismissingIds, setDismissingIds] = useState(new Set());
  const [contextTab, setContextTab] = useState("thread");
  const [tasks, setTasks] = useState(() => IS_APPS_SCRIPT ? [] : [...TASKS]);
  const [vips, setVips] = useState(() => IS_APPS_SCRIPT ? [] : [...VIPS]);
  const [followups] = useState(() => [...FOLLOWUPS]);
  const [loadingInbox, setLoadingInbox] = useState(IS_APPS_SCRIPT);
  const [user, setUser] = useState(() => IS_APPS_SCRIPT ? { name: "Loading…", email: "" } : { name: "Jamie Tran", email: "jamie@acme.com" });
  const [toasts, setToasts] = useState([]);
  const [cmdOpen, setCmdOpen] = useState(false);
  const [focusOpen, setFocusOpen] = useState(false);
  const [draft, setDraft] = useState({ text: "", tone: "Warm", streaming: false, chat: { history: [], thinking: false } });

  // Scenario switch resets list — removed (single scenario)

  // ---- Live Gmail fetch (Apps Script only) ----
  const pushToast = useCallback((msg, undoFn) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(t => [...t, { id, msg, undoFn }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4500);
  }, []);

  const refreshInbox = useCallback(() => {
    if (!IS_APPS_SCRIPT) return;
    setLoadingInbox(true);
    gsRun("fetchInboxSnapshot")
      .then(snapshot => {
        const initial = (snapshot.emails || []).map(mapServerEmail);
        setEmails(initial);
        return gsRun("classifyInboxEmails", snapshot.emails);
      })
      .then(classified => {
        if (classified && classified.emails) {
          setEmails(classified.emails.map(mapServerEmail));
        }
      })
      .catch(e => pushToast("Inbox load failed: " + (e.message || e)))
      .finally(() => setLoadingInbox(false));
  }, [pushToast]);

  useEffect(() => {
    if (!IS_APPS_SCRIPT) return;
    refreshInbox();
    gsRun("getTasks").then(t => Array.isArray(t) && setTasks(t.map(mapTask))).catch(() => {});
    gsRun("getVipSenders").then(v => Array.isArray(v) && setVips(v.map(mapVip))).catch(() => {});
    gsRun("getCurrentUser").then(u => u && u.email && setUser({ name: u.name || u.email.split("@")[0], email: u.email })).catch(() => {});
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Lazy-load thread when an email is selected
  useEffect(() => {
    if (!IS_APPS_SCRIPT || !selectedId) return;
    const email = emails.find(e => e.id === selectedId);
    if (!email || email.thread) return;
    gsRun("getEmailBody", selectedId).then(messages => {
      const thread = (messages || []).map(m => ({
        from: m.from || (m.isMe ? "You" : "(unknown)"),
        text: m.body || "",
        time: m.date ? new Date(m.date).toLocaleString() : "",
        isMe: m.isMe,
      }));
      setEmails(prev => prev.map(e => e.id === selectedId ? { ...e, thread } : e));
    }).catch(() => {});
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [selectedId]);

  // Derived: filtered emails
  const filtered = useMemo(() => {
    let list = emails.filter(e => !dismissingIds.has(e.id));

    if (view === "attention") {
      list = list.filter(e => (e.reasons && e.reasons.length) || e.category === "escalation");
    }
    if (activeTab === "attention") {
      list = list.filter(e => (e.reasons && e.reasons.length) || e.category === "escalation");
    } else if (activeTab !== "all") {
      list = list.filter(e => e.category === activeTab);
    }
    if (activeCat) list = list.filter(e => e.category === activeCat);

    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(e =>
        [e.sender, e.email, e.subject, e.preview].some(v => String(v||"").toLowerCase().includes(q))
      );
    }

    return list.sort((a, b) => {
      const ao = CAT_ORDER.indexOf(a.category);
      const bo = CAT_ORDER.indexOf(b.category);
      if (ao !== bo) return ao - bo;
      return (b.priority || 0) - (a.priority || 0);
    });
  }, [emails, view, activeTab, activeCat, search, dismissingIds]);

  const selectedEmail = useMemo(() => emails.find(e => e.id === selectedId), [emails, selectedId]);

  // Counts for rail
  const totals = useMemo(() => ({
    inbox: emails.length,
    attention: emails.filter(e => (e.reasons && e.reasons.length) || e.category === "escalation").length,
    tasks: tasks.filter(t => !t.done).length,
    vipFollow: vips.length + followups.length,
    resolved: 0,
    trashed: 0,
  }), [emails, tasks, vips, followups]);

  // Toast helpers — pushToast defined above

  // Email actions (with animation + undo)
  const doAction = useCallback((ids, action) => {
    const idSet = new Set(Array.isArray(ids) ? ids : [ids]);
    const affected = emails.filter(e => idSet.has(e.id));
    setDismissingIds(prev => new Set([...prev, ...idSet]));

    setTimeout(() => {
      setEmails(prev => prev.filter(e => !idSet.has(e.id)));
      setDismissingIds(prev => {
        const next = new Set(prev);
        idSet.forEach(id => next.delete(id));
        return next;
      });
      if (idSet.has(selectedId)) setSelectedId(null);
      setChecked(prev => {
        const next = new Set(prev);
        idSet.forEach(id => next.delete(id));
        return next;
      });
    }, 240);

    const verb = action === "resolve" ? "Resolved" : action === "trash" ? "Trashed" : "Snoozed";
    const n = affected.length;
    pushToast(
      `${verb} ${n} email${n === 1 ? "" : "s"}`,
      () => { setEmails(prev => [...affected, ...prev]); }
    );

    // Server-side
    if (IS_APPS_SCRIPT) {
      const fn = action === "resolve" ? "resolveEmail" : action === "trash" ? "trashEmail" : null;
      if (fn) idSet.forEach(id => gsRun(fn, id).catch(e => pushToast("Server: " + (e.message||e))));
    }
  }, [emails, selectedId, pushToast]);

  // Batch select
  const onCheck = useCallback((id, shouldCheck, shift) => {
    setChecked(prev => {
      const next = new Set(prev);
      if (shift && lastChecked) {
        // Range select
        const ids = filtered.map(e => e.id);
        const a = ids.indexOf(lastChecked);
        const b = ids.indexOf(id);
        if (a >= 0 && b >= 0) {
          const [lo, hi] = a < b ? [a, b] : [b, a];
          for (let i = lo; i <= hi; i++) {
            if (shouldCheck) next.add(ids[i]); else next.delete(ids[i]);
          }
        }
      } else {
        if (shouldCheck) next.add(id); else next.delete(id);
      }
      return next;
    });
    setLastChecked(id);
  }, [lastChecked, filtered]);

  // Draft handling — uses real Claude via fetchAndDraftReply on Apps Script,
  // local mock template otherwise. Visual char-by-char streaming for feel.
  const streamDraft = useCallback(async (email, tone) => {
    setDraft({ text: "", tone: tone || "Warm", streaming: true, chat: { history: [], thinking: false } });
    setContextTab("draft");

    let full;
    try {
      if (IS_APPS_SCRIPT) {
        const result = await gsRun("fetchAndDraftReply", email.id);
        full = (result && result.draft) || "";
      } else {
        full = TONE_DRAFTS[tone || "Warm"](email);
      }
    } catch (e) {
      pushToast("Draft failed: " + (e.message || e));
      setDraft({ text: "", tone: tone || "Warm", streaming: false, chat: { history: [], thinking: false } });
      return;
    }

    let i = 0;
    const chunk = Math.max(2, Math.floor(full.length / 80));
    const tick = () => {
      i += chunk + Math.floor(Math.random() * 3);
      if (i >= full.length) {
        setDraft(d => ({ ...d, text: full, streaming: false }));
        return;
      }
      setDraft(d => ({ ...d, text: full.slice(0, i) }));
      setTimeout(tick, 18 + Math.random() * 28);
    };
    setTimeout(tick, 100);
  }, [pushToast]);

  // Refine current draft via chat
  const refineDraft = useCallback(async (instruction) => {
    if (!selectedEmail) return;
    setDraft(d => ({
      ...d,
      streaming: true,
      chat: {
        history: [...(d.chat?.history || []), { role: "user", text: instruction }],
        thinking: true,
      },
    }));

    let nextDraft;
    try {
      if (IS_APPS_SCRIPT) {
        // Expects a server function `refineDraft(messageId, currentDraft, instruction, tone)`
        // returning { draft: "..." }. See chat block below for the Code.gs snippet.
        const result = await gsRun("refineDraft", selectedEmail.id, draft.text, instruction, draft.tone);
        nextDraft = (result && result.draft) || "";
      } else {
        // Local mock: tweak the existing draft heuristically so the UX is testable.
        const base = draft.text || TONE_DRAFTS[draft.tone || "Warm"](selectedEmail);
        const i = instruction.toLowerCase();
        if (i.includes("short")) nextDraft = base.split("\n\n").slice(0, 2).join("\n\n");
        else if (i.includes("casual")) nextDraft = base.replace(/Dear /g, "Hi ").replace(/Kind regards/g, "Cheers");
        else if (i.includes("formal")) nextDraft = "Dear " + selectedEmail.sender.split(" ")[0] + ",\n\n" + base + "\n\nKind regards,\nJamie";
        else if (i.includes("question")) nextDraft = base + "\n\nWhat would you like to do next?";
        else if (i.includes("direct")) nextDraft = base.split("\n\n").map(p => p.replace(/I have /g, "I've ")).join("\n\n");
        else nextDraft = base + "\n\n[Refined per: " + instruction + "]";
      }
    } catch (e) {
      pushToast("Refine failed: " + (e.message || e));
      setDraft(d => ({ ...d, streaming: false, chat: { ...d.chat, thinking: false } }));
      return;
    }

    // Stream the refined response
    const full = nextDraft;
    setDraft(d => ({
      ...d,
      text: "",
      streaming: true,
      chat: {
        history: [...d.chat.history, { role: "claude", text: "Done — updated the draft." }],
        thinking: false,
      },
    }));

    let i = 0;
    const chunk = Math.max(2, Math.floor(full.length / 80));
    const tick = () => {
      i += chunk + Math.floor(Math.random() * 3);
      if (i >= full.length) {
        setDraft(d => ({ ...d, text: full, streaming: false }));
        return;
      }
      setDraft(d => ({ ...d, text: full.slice(0, i) }));
      setTimeout(tick, 18 + Math.random() * 28);
    };
    setTimeout(tick, 80);
  }, [selectedEmail, draft.text, draft.tone, pushToast]);

  const openDraft = useCallback((email) => {
    setSelectedId(email.id);
    streamDraft(email, draft.tone);
  }, [streamDraft, draft.tone]);

  const sendDraft = useCallback(() => {
    if (!selectedEmail) return;
    if (IS_APPS_SCRIPT) {
      gsRun("sendDraftReply", selectedEmail.id, draft.text)
        .then(() => {
          pushToast("Reply sent · email resolved");
          doAction(selectedEmail.id, "resolve");
          setDraft({ text: "", tone: "Warm", streaming: false });
          setContextTab("thread");
        })
        .catch(e => pushToast("Send failed: " + (e.message || e)));
      return;
    }
    pushToast("Reply sent · email resolved");
    doAction(selectedEmail.id, "resolve");
    setDraft({ text: "", tone: "Warm", streaming: false });
    setContextTab("thread");
  }, [selectedEmail, draft.text, doAction, pushToast]);

  // Tasks
  const toggleTask = useCallback((id) => {
    let nextDone = false;
    setTasks(prev => prev.map(t => {
      if (t.id !== id) return t;
      nextDone = !t.done;
      return { ...t, done: nextDone };
    }));
    if (IS_APPS_SCRIPT) gsRun("markTaskDone", id, nextDone).catch(() => {});
  }, []);

  // VIPs
  const addVip = useCallback((val) => {
    const v = String(val || "").toLowerCase().trim();
    if (!v) return;
    setVips(prev => prev.some(x => x.email === v) ? prev : [...prev, mapVip(v)]);
    if (IS_APPS_SCRIPT) {
      gsRun("addVipSender", v)
        .then(updated => Array.isArray(updated) && setVips(updated.map(mapVip)))
        .catch(e => pushToast("Add VIP failed: " + (e.message || e)));
    }
  }, [pushToast]);

  const removeVip = useCallback((val) => {
    setVips(prev => prev.filter(x => x.email !== val));
    if (IS_APPS_SCRIPT) {
      gsRun("removeVipSender", val)
        .then(updated => Array.isArray(updated) && setVips(updated.map(mapVip)))
        .catch(e => pushToast("Remove VIP failed: " + (e.message || e)));
    }
  }, [pushToast]);

  // Keyboard shortcuts
  useEffect(() => {
    const onKey = (e) => {
      const tag = (e.target.tagName || "").toLowerCase();
      const inField = tag === "input" || tag === "textarea";

      // Cmd/Ctrl-K — palette (works even in fields)
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        setCmdOpen(true);
        return;
      }
      if (inField) return;

      if (e.key === "?") { setCmdOpen(true); return; }
      if (e.altKey && e.key.toLowerCase() === "f") { e.preventDefault(); setFocusOpen(true); return; }

      // List navigation
      if (focusOpen) return;
      if (e.key === "j" || e.key === "ArrowDown") {
        e.preventDefault();
        const i = filtered.findIndex(x => x.id === selectedId);
        const next = filtered[Math.min(filtered.length - 1, i + 1)] || filtered[0];
        if (next) setSelectedId(next.id);
      }
      if (e.key === "k" || e.key === "ArrowUp") {
        e.preventDefault();
        const i = filtered.findIndex(x => x.id === selectedId);
        const next = filtered[Math.max(0, i - 1)] || filtered[0];
        if (next) setSelectedId(next.id);
      }
      if (selectedId) {
        if (e.key === "r") { doAction(selectedId, "resolve"); }
        if (e.key === "t") { doAction(selectedId, "trash"); }
        if (e.key === "s") { doAction(selectedId, "snooze"); }
        if (e.key === "e") {
          const em = emails.find(x => x.id === selectedId);
          if (em) openDraft(em);
        }
      }
      // Select all when checks present
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "a") {
        e.preventDefault();
        setChecked(new Set(filtered.map(x => x.id)));
      }
      if (e.key === "Escape") {
        setChecked(new Set());
        if (selectedId) setSelectedId(null);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [filtered, selectedId, doAction, openDraft, emails, focusOpen]);

  // Auto-select first item on mount
  useEffect(() => {
    if (filtered.length && !selectedId) {
      setSelectedId(filtered[0].id);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // ---- Sub-views ----
  if (focusOpen) {
    return (
      <div className="shell focus">
        <FocusMode
          emails={emails}
          onExit={() => setFocusOpen(false)}
          onAction={doAction}
          onOpenDraft={openDraft}
        />
        <CommandPalette
          open={cmdOpen}
          onClose={() => setCmdOpen(false)}
          emails={emails}
          onSelectEmail={(id) => { setSelectedId(id); setFocusOpen(false); }}
          onAction={doAction}
          onSetView={(v) => { setView(v); setFocusOpen(false); }}
          onToggleFocus={() => setFocusOpen(true)}
        />
        <ToastWrap toasts={toasts} />
      </div>
    );
  }

  // ---- Build list groups (when activeTab=all) ----
  const sectioned = activeTab === "all" && !search;
  const sectionedGroups = sectioned
    ? CAT_ORDER.map(cat => ({
        cat,
        items: filtered.filter(e => e.category === cat),
      })).filter(g => g.items.length > 0)
    : [{ cat: null, items: filtered }];

  return (
    <div className={`shell ${(view === "tasks" || view === "vips" || view === "resolved" || view === "trashed") ? "no-right" : ""}`}>
      <Rail
        view={view}
        setView={(v) => {
          setView(v);
          if (v === "tasks") setContextTab("tasks");
          else if (v === "vips") setContextTab("tracker");
          else setContextTab("thread");
          if (v === "attention") setActiveTab("attention");
          else if (v === "inbox") setActiveTab("all");
        }}
        totals={totals}
        user={user}
        logoUrl={LOGO_URL}
      />

      <main className="main">
        <header className="topbar">
          <div>
            <div className="topbar-title">
              {view === "inbox" && "Inbox"}
              {view === "attention" && "Attention queue"}
              {view === "tasks" && "Tasks"}
              {view === "vips" && "VIPs & follow-ups"}
              {view === "resolved" && "Resolved"}
              {view === "trashed" && "Trashed"}
            </div>
            <div className="topbar-sub">
              {loadingInbox
                ? "Fetching inbox…"
                : `${emails.length} email${emails.length === 1 ? "" : "s"} · ${totals.attention} need attention`}
            </div>
          </div>

          <div className="search" style={{marginLeft:"auto"}}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5">
              <circle cx="6" cy="6" r="4.5" /><path d="M9.5 9.5L12 12" strokeLinecap="round" />
            </svg>
            <input
              placeholder="Search inbox…"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
            />
            {search && (
              <button
                onClick={() => setSearch("")}
                title="Clear search"
                style={{background:"none",border:"none",color:"var(--fg-dim)",cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px"}}
              >×</button>
            )}
            <span className="search-kbd">⌘K</span>
          </div>

          <button className="icon-btn" title="Refresh inbox" onClick={refreshInbox} disabled={loadingInbox} style={loadingInbox ? {opacity:0.5} : {}}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5" style={loadingInbox?{animation:"spin 1s linear infinite"}:{}}>
              <path d="M12 4a5 5 0 11-1.5-3.5M12 1v3h-3" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
          <button className="icon-btn" title="Focus mode (alt-F)" onClick={() => setFocusOpen(true)}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5">
              <circle cx="7" cy="7" r="5.5"/><circle cx="7" cy="7" r="2"/>
            </svg>
          </button>
        </header>

        {(view === "inbox" || view === "attention") && (
          <>
            <Stats emails={emails} activeCat={activeCat} setActiveCat={setActiveCat} />
            <AttentionBanner
              emails={emails}
              style={tw.attentionStyle}
              onClick={() => setFocusOpen(true)}
            />
            <EmailListTabs emails={emails} activeTab={activeTab} setActiveTab={setActiveTab} />

            {checked.size > 0 && (
              <div className="batch-bar">
                <span className="batch-count">{checked.size} selected</span>
                <button className="batch-btn primary" onClick={() => doAction(Array.from(checked), "resolve")}>✓ Resolve all</button>
                <button className="batch-btn" onClick={() => doAction(Array.from(checked), "snooze")}>☾ Snooze</button>
                <button className="batch-btn" onClick={() => doAction(Array.from(checked), "trash")}>🗑 Trash</button>
                <span className="batch-spacer" />
                <button className="batch-btn" onClick={() => setChecked(new Set())}>Clear</button>
              </div>
            )}

            <div className="list">
              {filtered.length === 0 && (
                <div className="list-empty">
                  <div className="list-empty-icon">📭</div>
                  <div className="list-empty-title">Nothing here</div>
                  <div className="list-empty-sub">{search ? `No matches for "${search}"` : "Try a different filter"}</div>
                  {search && (
                    <button
                      className="thread-btn"
                      onClick={() => setSearch("")}
                      style={{marginTop:18, display:"inline-flex"}}
                    >× Clear search</button>
                  )}
                </div>
              )}
              {sectionedGroups.map((g, gi) => (
                <React.Fragment key={g.cat || "all"}>
                  {g.cat && (
                    <div className="list-section-label">
                      {CAT_LABEL[g.cat]} · {g.items.length}
                    </div>
                  )}
                  {g.items.map(email => (
                    <EmailRow
                      key={email.id}
                      email={email}
                      selected={selectedId === email.id}
                      checked={checked.has(email.id)}
                      dismissing={dismissingIds.has(email.id)}
                      batchMode={checked.size > 0}
                      onSelect={(id) => { setSelectedId(id); setContextTab("thread"); }}
                      onCheck={onCheck}
                      onAction={doAction}
                    />
                  ))}
                </React.Fragment>
              ))}
            </div>
          </>
        )}

        {view === "tasks" && (
          <div className="list" style={{padding:"18px"}}>
            <TasksFullView tasks={tasks} toggleTask={toggleTask} />
          </div>
        )}

        {view === "vips" && (
          <div className="list" style={{padding:"18px"}}>
            <TrackerFullView vips={vips} followups={followups} />
          </div>
        )}

        {(view === "resolved" || view === "trashed") && (
          <div className="list-empty" style={{padding:"80px 20px"}}>
            <div className="list-empty-icon">{view === "resolved" ? "✓" : "🗑"}</div>
            <div className="list-empty-title">No {view} items in this session</div>
            <div className="list-empty-sub">Resolve or trash emails to see them here</div>
          </div>
        )}
      </main>

      {(view === "inbox" || view === "attention") && (
        <ContextPane
          contextTab={contextTab}
          setContextTab={setContextTab}
          selectedEmail={selectedEmail}
          onResolve={(id) => doAction(id, "resolve")}
          onTrash={(id) => doAction(id, "trash")}
          onSnooze={(id) => doAction(id, "snooze")}
          tasks={tasks}
          toggleTask={toggleTask}
          vips={vips}
          followups={followups}
          onAddVip={addVip}
          onRemoveVip={removeVip}
          draftState={draft}
          onOpenDraft={openDraft}
          onUpdateDraft={(text) => setDraft(d => ({ ...d, text, streaming: false }))}
          onSendDraft={sendDraft}
          onChatRefine={refineDraft}
          onChangeTone={(tone) => {
            setDraft(d => ({ ...d, tone }));
            if (selectedEmail) streamDraft(selectedEmail, tone);
          }}
        />
      )}

      <CommandPalette
        open={cmdOpen}
        onClose={() => setCmdOpen(false)}
        emails={emails}
        onSelectEmail={(id) => { setSelectedId(id); setView("inbox"); setContextTab("thread"); }}
        onAction={doAction}
        onSetView={setView}
        onToggleFocus={() => setFocusOpen(true)}
      />

      <ToastWrap toasts={toasts} />

      <AppTweaks tw={tw} setTweak={setTweak} />
    </div>
  );
};

const ToastWrap = ({ toasts }) => (
  <div className="toast-wrap">
    {toasts.map(t => (
      <div key={t.id} className="toast">
        <span>{t.msg}</span>
        {t.undoFn && <button className="toast-undo" onClick={t.undoFn}>Undo</button>}
      </div>
    ))}
  </div>
);

const TasksFullView = ({ tasks, toggleTask }) => {
  const active = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);
  return (
    <div style={{maxWidth: 760, margin: "0 auto"}}>
      <div style={{fontFamily:"var(--font-mono)",fontSize:10,letterSpacing:"0.08em",color:"var(--fg-dim)",textTransform:"uppercase",marginBottom:12}}>
        Active · {active.length} · Auto-extracted by Claude from your inbox
      </div>
      <div>
        {active.map(t => (
          <div key={t.id} className="task" style={{borderBottom:"1px solid var(--line-soft)",padding:"14px 0"}}>
            <button className={`task-check ${t.done?"done":""}`} onClick={() => toggleTask(t.id)}>
              {t.done && <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2 2 4-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </button>
            <div className="task-body">
              <div className="task-text" style={{fontSize:14}}>{t.text}</div>
              <div className="task-meta">
                <span className={`task-pri ${t.priority}`}>{t.priority}</span>
                <span className="task-due">⏱ {t.due}</span>
                <span className="task-source">from {t.source}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
      {done.length > 0 && (
        <>
          <div style={{fontFamily:"var(--font-mono)",fontSize:10,letterSpacing:"0.08em",color:"var(--fg-dim)",textTransform:"uppercase",margin:"24px 0 12px"}}>
            Done · {done.length}
          </div>
          {done.map(t => (
            <div key={t.id} className="task done" style={{borderBottom:"1px solid var(--line-soft)",padding:"14px 0"}}>
              <button className="task-check done" onClick={() => toggleTask(t.id)}>
                <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2 2 4-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
              <div className="task-body">
                <div className="task-text" style={{fontSize:14}}>{t.text}</div>
                <div className="task-meta"><span className="task-source">from {t.source}</span></div>
              </div>
            </div>
          ))}
        </>
      )}
    </div>
  );
};

const TrackerFullView = ({ vips, followups }) => (
  <div style={{maxWidth: 760, margin: "0 auto", display:"grid", gridTemplateColumns:"1fr 1fr", gap:24}}>
    <div>
      <div style={{fontFamily:"var(--font-mono)",fontSize:10,letterSpacing:"0.08em",color:"var(--fg-dim)",textTransform:"uppercase",marginBottom:12}}>
        VIP senders · {vips.length}
      </div>
      {vips.map(v => (
        <div key={v.email} className="vip-row" style={{padding:"12px 0"}}>
          <div className="vip-avatar">{(v.name||"").split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase()}</div>
          <div>
            <div className="vip-name">{v.name}</div>
            <div className="vip-meta">{v.role} · {v.email}</div>
          </div>
          <span className="followup-due">{v.last}</span>
        </div>
      ))}
    </div>
    <div>
      <div style={{fontFamily:"var(--font-mono)",fontSize:10,letterSpacing:"0.08em",color:"var(--fg-dim)",textTransform:"uppercase",marginBottom:12}}>
        Pending follow-ups · {followups.length}
      </div>
      {followups.map(f => (
        <div key={f.id} className="followup-row" style={{padding:"12px 0"}}>
          <div className="vip-avatar" style={{background:"var(--bg-elev-2)"}}>↗</div>
          <div>
            <div className="followup-to">{f.to}</div>
            <div className="followup-meta">{f.subject} · sent {f.sent}</div>
          </div>
          <span className={`followup-due ${f.overdue?"overdue":""}`}>{f.due}</span>
        </div>
      ))}
    </div>
  </div>
);

const AppTweaks = ({ tw, setTweak }) => (
  <TweaksPanel title="Tweaks">
    <TweakSection title="Theme">
      <TweakRadio
        label="Mode"
        value={tw.theme}
        onChange={(v) => setTweak("theme", v)}
        options={[
          { value: "dark",  label: "Dark"  },
          { value: "light", label: "Light" },
          { value: "hc",    label: "HC"    },
        ]}
      />
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0"}}>
        <span style={{fontSize:12,color:"var(--fg-mute)"}}>Accent</span>
        <AccentHueSwatches value={tw.accentHue} onChange={(v) => setTweak("accentHue", v)} />
      </div>
    </TweakSection>
    <TweakSection title="Layout">
      <TweakRadio
        label="Density"
        value={tw.density}
        onChange={(v) => setTweak("density", v)}
        options={[
          { value: "comfortable", label: "Comfy"   },
          { value: "compact",     label: "Compact" },
        ]}
      />
      <TweakRadio
        label="Attention"
        value={tw.attentionStyle}
        onChange={(v) => setTweak("attentionStyle", v)}
        options={[
          { value: "banner", label: "Banner" },
          { value: "hero",   label: "Hero"   },
          { value: "hidden", label: "Hidden" },
        ]}
      />
      <TweakRadio
        label="Motion"
        value={tw.motion}
        onChange={(v) => setTweak("motion", v)}
        options={[
          { value: "subtle", label: "Subtle" },
          { value: "off",    label: "Off"    },
        ]}
      />
    </TweakSection>
  </TweaksPanel>
);

const AccentHueSwatches = ({ value, onChange }) => {
  const hues = [162, 200, 240, 280, 25, 80];
  return (
    <div style={{display:"flex",gap:6,padding:"4px 0"}}>
      {hues.map(h => (
        <button
          key={h}
          onClick={() => onChange(h)}
          style={{
            width: 26, height: 26, borderRadius: "50%",
            background: `oklch(0.74 0.13 ${h})`,
            border: value === h ? "2px solid var(--fg)" : "1px solid var(--line)",
            cursor: "pointer",
          }}
        />
      ))}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
